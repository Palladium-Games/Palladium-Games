<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse - Palladium Games</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>(function(){if(localStorage.getItem('navStripExpanded')==='true')document.documentElement.classList.add('nav-strip-expanded');})();</script>
</head>
<body class="browse-page iframe-page">
    <nav class="nav-strip" id="navStrip" aria-label="Main navigation">
        <button type="button" class="nav-strip-toggle" id="navStripToggle" aria-expanded="false" aria-label="Expand menu">
            <span class="nav-strip-toggle-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
            <span class="nav-strip-label-toggle">Menu</span>
        </button>
        <div class="nav-strip-logo"><span class="nav-strip-logo-icon">P</span><span class="nav-strip-logo-text">Palladium Games</span></div>
        <div class="nav-strip-tabs">
            <a href="index.html" class="nav-strip-tab" title="Home">
                <span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
                <span class="nav-strip-tab-label">Home</span>
            </a>
            <a href="games.html" class="nav-strip-tab" title="Games">
                <span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M12 18h.01"/></svg></span>
                <span class="nav-strip-tab-label">Games</span>
            </a>
            <a href="browse.html" class="nav-strip-tab active" title="Browse">
                <span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span>
                <span class="nav-strip-tab-label">Browse</span>
            </a>
            <a href="chatbot.html" class="nav-strip-tab" title="AI Chatbot">
                <span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
                <span class="nav-strip-tab-label">AI Chatbot</span>
            </a>
            <a href="music.html" class="nav-strip-tab" title="Music">
                <span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span>
                <span class="nav-strip-tab-label">Music</span>
            </a>
            <a href="tv.html" class="nav-strip-tab" title="TV">
                <span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2l-5 5-5-5"/></svg></span>
                <span class="nav-strip-tab-label">TV</span>
            </a>
            <a href="movies.html" class="nav-strip-tab" title="Movies">
                <span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5"/></svg></span>
                <span class="nav-strip-tab-label">Movies</span>
            </a>
        </div>
    </nav>
    <script>(function(){var r=localStorage.getItem('navStripExpanded');if(r==='true'){var s=document.getElementById('navStrip');var t=document.getElementById('navStripToggle');if(s)s.classList.add('expanded');document.body.classList.add('nav-expanded');if(t)t.setAttribute('aria-expanded','true');}})();</script>
    <div class="iframe-wrapper">
        <div class="iframe-container browse-embed-wrap">
            <div class="browser-container">
                <div class="browser-toolbar browse-toolbar">
                    <div class="browser-nav-buttons">
                        <button class="browser-btn" id="browserBack" title="Back" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                        </button>
                        <button class="browser-btn" id="browserForward" title="Forward" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                        <button class="browser-btn" id="browserRefresh" title="Refresh">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/></svg>
                        </button>
                        <button class="browser-btn" id="browserHome" title="Home">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        </button>
                    </div>
                    <form id="browserAddressForm" class="browse-address-bar">
                        <span class="browse-address-icon" aria-hidden="true">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        </span>
                        <input type="text" id="browserAddressInput" class="browse-address-input" placeholder="Search or enter address" autocomplete="off" spellcheck="false">
                        <button type="submit" class="browse-address-go" title="Go">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </form>
                </div>
                <div class="browser-content">
                    <div id="browserProxyError" class="browser-proxy-error" style="display: none;" role="alert">
                        <span>This site can't be displayed in the embedded viewer.</span>
                        <a id="browserProxyErrorOpen" href="#" target="_blank" rel="noopener noreferrer">Open in new tab</a>
                    </div>
                    <div id="browserOpenInNewTabNotice" class="browser-open-in-new-tab-notice" style="display: none;" role="status">
                        <span>Opened in a new tab for compatibility.</span>
                        <a id="browserOpenInNewTabLink" href="#" target="_blank" rel="noopener noreferrer">Open again</a>
                    </div>
                    <iframe id="browserFrame" class="browser-frame" title="Browse"></iframe>
                    <div id="browserLoading" class="browser-loading" style="display: none;">
                        <div class="browser-spinner"></div>
                        <p>Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="nav-strip.js"></script>
    <script src="browse.js"></script>
</body>
</html>
