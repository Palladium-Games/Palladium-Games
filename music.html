<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music - Palladium Games</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>(function(){if(localStorage.getItem('navStripExpanded')==='true')document.documentElement.classList.add('nav-strip-expanded');})();</script>
    <style>
        .music-embed-wrap { position: fixed; top: 0; right: 0; bottom: 0; left: var(--nav-strip-width); transition: left var(--nav-strip-duration) var(--nav-strip-ease); display: flex; flex-direction: column; min-height: 0; }
        .music-embed-wrap iframe { flex: 1; width: 100%; height: 100%; min-height: 0; border: none; display: block; background: var(--bg-card); }
        .music-placeholder { padding: 2rem; max-width: 560px; margin: 2rem auto; text-align: center; color: var(--text-secondary); }
        .music-placeholder h2 { color: var(--text-primary); margin-bottom: 1rem; }
        .music-placeholder a { color: #60a5fa; }
    </style>
</head>
<body class="iframe-page" style="height: 100vh; overflow: hidden;">
    <nav class="nav-strip" id="navStrip" aria-label="Main navigation">
        <button type="button" class="nav-strip-toggle" id="navStripToggle" aria-expanded="false" aria-label="Expand menu">
            <span class="nav-strip-toggle-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
            <span class="nav-strip-label-toggle">Menu</span>
        </button>
        <div class="nav-strip-logo"><span class="nav-strip-logo-icon">P</span><span class="nav-strip-logo-text">Palladium Games</span></div>
        <div class="nav-strip-tabs">
            <a href="index.html" class="nav-strip-tab" title="Home"><span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="nav-strip-tab-label">Home</span></a>
            <a href="games.html" class="nav-strip-tab" title="Games"><span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M12 18h.01"/></svg></span><span class="nav-strip-tab-label">Games</span></a>
            <a href="browse.html" class="nav-strip-tab" title="Browse"><span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span><span class="nav-strip-tab-label">Browse</span></a>
            <a href="chatbot.html" class="nav-strip-tab" title="AI Chatbot"><span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span><span class="nav-strip-tab-label">AI Chatbot</span></a>
            <a href="music.html" class="nav-strip-tab active" title="Music"><span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span><span class="nav-strip-tab-label">Music</span></a>
            <a href="tv.html" class="nav-strip-tab" title="TV"><span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2l-5 5-5-5"/></svg></span><span class="nav-strip-tab-label">TV</span></a>
            <a href="movies.html" class="nav-strip-tab" title="Movies"><span class="nav-strip-tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5"/></svg></span><span class="nav-strip-tab-label">Movies</span></a>
        </div>
    </nav>
    <script>(function(){var r=localStorage.getItem('navStripExpanded');if(r==='true'){var s=document.getElementById('navStrip');var t=document.getElementById('navStripToggle');if(s)s.classList.add('expanded');document.body.classList.add('nav-expanded');if(t)t.setAttribute('aria-expanded','true');}})();</script>
    <div class="music-embed-wrap" id="musicWrap">
        <iframe id="musicFrame" title="Monochrome Music" style="display: none;"></iframe>
        <div class="music-placeholder" id="musicPlaceholder">
            <h2>Music</h2>
            <p>To use the music player, self-host <a href="https://github.com/monochrome-music/monochrome" target="_blank" rel="noopener">Monochrome</a> and set its URL in <code>music-config.js</code> (e.g. <code>MUSIC_URL = 'http://localhost:3000'</code> or <code>https://monochrome.tf</code>). See <code>CHATBOT_README.md</code>.</p>
        </div>
    </div>
    <script src="music-config.js"></script>
    <script>
        (function() {
            var url = typeof MUSIC_URL !== 'undefined' ? MUSIC_URL : '';
            var frame = document.getElementById('musicFrame');
            var placeholder = document.getElementById('musicPlaceholder');
            if (url && frame && placeholder) {
                frame.src = url;
                frame.style.display = 'block';
                placeholder.style.display = 'none';
            }
        })();
    </script>
    <script src="nav-strip.js"></script>
</body>
</html>
