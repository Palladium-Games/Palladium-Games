    <script>
(function() {
    var apiBase = typeof CHATBOT_API_URL !== 'undefined' ? (CHATBOT_API_URL || '').replace(/\/$/, '') : '';
    var model = typeof CHATBOT_MODEL !== 'undefined' ? CHATBOT_MODEL : 'llama3.2';
    var iframeUrl = typeof CHATBOT_URL !== 'undefined' ? CHATBOT_URL : '';
    var searchApiUrl = typeof CHATBOT_SEARCH_API_URL !== 'undefined'
        ? CHATBOT_SEARCH_API_URL
        : 'http://localhost:1337/ai-search';
    var internetEnabled = typeof CHATBOT_ENABLE_INTERNET !== 'undefined'
        ? !!CHATBOT_ENABLE_INTERNET
        : true;
    var frame = document.getElementById('chatbotFrame');
    var placeholder = document.getElementById('chatbotPlaceholder');
    var palladiumAi = document.getElementById('palladiumAi');
    var messagesEl = document.getElementById('palladiumAiMessages');
    var form = document.getElementById('palladiumAiForm');
    var input = document.getElementById('palladiumAiInput');
    var sendBtn = document.getElementById('palladiumAiSend');
    var newChatBtn = document.getElementById('palladiumAiNewChat');

    var SYSTEM_PROMPT = [
        'You are **PalladiumAI**, the assistant for the Palladium Games website.',
        '',
        'Website context:',
        '- Main sections: Home (`index.html`), Games (`games.html`), Browse (`browse.html`), AI Chatbot (`chatbot.html`), Music (`music.html`), TV (`tv.html`), Movies (`movies.html`).',
        '- Browse uses a local proxy service.',
        '- Local game availability is determined by `/games` catalog data provided in context.',
        '',
        'Behavior rules (strict):',
        '1. Do **not** invent facts, games, links, features, or statuses.',
        '2. For game-related answers, only use the provided local `/games` catalog context.',
        '3. If information is missing or uncertain, say exactly: **"I don\'t know based on the available data."**',
        '4. If web-search context is provided, use it carefully and call out uncertainty when needed.',
        '5. Prefer direct, practical answers for users of this website.',
        '',
        'Formatting rules:',
        '- Always respond in markdown.',
        '- Use short headings and bullet lists when useful.',
        '- Include clickable links when you can reference local pages or known URLs.',
        '- Keep answers concise unless the user asks for detail.'
    ].join('\n');
    var history = [];
    var MAX_HISTORY_MESSAGES = 12;
    var RESPONSE_TIMEOUT_MS = 90000;
    var OLLAMA_KEEP_ALIVE = '30m';
    var MEMORY_TTL_MS = 20 * 60 * 1000;
    var gamesCatalogPromise = null;
    var lastLoadedGames = [];
    var memoryTimer = null;

    function setStatus(text, ok) {
        var el = document.getElementById('palladiumAiStatus');
        if (el) { el.textContent = text; el.style.color = ok ? 'var(--text-secondary)' : '#b91c1c'; }
    }

    function scheduleMemoryClear() {
        if (memoryTimer) clearTimeout(memoryTimer);
        memoryTimer = setTimeout(function() {
            history = [];
            messagesEl.innerHTML = '';
            setStatus('Memory cleared', true);
        }, MEMORY_TTL_MS);
    }

    function resizeInput() {
        if (!input) return;
        input.style.height = '50px';
        input.style.height = Math.min(input.scrollHeight, 180) + 'px';
    }

    function showMode() {
        if (apiBase) {
            palladiumAi.style.display = 'flex';
            if (frame) frame.style.display = 'none';
            if (placeholder) placeholder.style.display = 'none';
            fetch(apiBase + '/api/tags').then(function(r) { return r.ok ? r.json() : Promise.reject(); }).then(function() { setStatus('Ollama · ' + model, true); }).catch(function() { setStatus('Ollama offline — start Ollama', false); });
        } else if (iframeUrl && frame) {
            frame.src = iframeUrl;
            frame.style.display = 'block';
            palladiumAi.style.display = 'none';
            if (placeholder) placeholder.style.display = 'none';
        } else {
            if (placeholder) placeholder.style.display = 'block';
            palladiumAi.style.display = 'none';
            if (frame) frame.style.display = 'none';
        }
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function toSafeHref(raw) {
        var value = (raw || '').trim();
        if (!value) return '';
        if (/^https?:\/\//i.test(value)) return value;
        var routeKey = value.toLowerCase().replace(/^\/+/, '').replace(/\/+$/, '');
        var routeMap = {
            'home': '/index.html',
            'index': '/index.html',
            'games': '/games.html',
            'browse': '/browse.html',
            'chatbot': '/chatbot.html',
            'music': '/music.html',
            'tv': '/tv.html',
            'movies': '/movies.html'
        };
        if (routeMap[routeKey]) return routeMap[routeKey];
        if (/^\/?[A-Za-z0-9_\-./]+(\?.*)?$/i.test(value)) {
            return value.charAt(0) === '/' ? value : ('/' + value);
        }
        return '';
    }

    function renderInlineMarkdown(text) {
        var html = text;
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, label, url) {
            var safeHref = toSafeHref(url);
            if (!safeHref) return escapeHtml(label);
            var isExternal = /^https?:\/\//i.test(safeHref);
            var linkAttrs = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
            var attrHref = safeHref.replace(/"/g, '&quot;');
            return '<a href="' + attrHref + '"' + linkAttrs + '>' + escapeHtml(label) + '</a>';
        });
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        return html;
    }

    function renderMarkdown(markdown) {
        var codeBlocks = [];
        var text = String(markdown || '').replace(/\r\n/g, '\n');
        text = text.replace(/```([\s\S]*?)```/g, function(_, code) {
            var token = '%%CODEBLOCK_' + codeBlocks.length + '%%';
            codeBlocks.push('<pre><code>' + escapeHtml(code.trim()) + '</code></pre>');
            return token;
        });
        text = escapeHtml(text);

        var lines = text.split('\n');
        var htmlParts = [];
        var inUl = false;
        var inOl = false;

        function closeLists() {
            if (inUl) { htmlParts.push('</ul>'); inUl = false; }
            if (inOl) { htmlParts.push('</ol>'); inOl = false; }
        }

        for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            var trimmed = line.trim();

            if (!trimmed) {
                closeLists();
                continue;
            }
            if (/^###\s+/.test(trimmed)) {
                closeLists();
                htmlParts.push('<h3>' + renderInlineMarkdown(trimmed.replace(/^###\s+/, '')) + '</h3>');
                continue;
            }
            if (/^##\s+/.test(trimmed)) {
                closeLists();
                htmlParts.push('<h2>' + renderInlineMarkdown(trimmed.replace(/^##\s+/, '')) + '</h2>');
                continue;
            }
            if (/^#\s+/.test(trimmed)) {
                closeLists();
                htmlParts.push('<h1>' + renderInlineMarkdown(trimmed.replace(/^#\s+/, '')) + '</h1>');
                continue;
            }
            if (/^[-*]\s+/.test(trimmed)) {
                if (inOl) { htmlParts.push('</ol>'); inOl = false; }
                if (!inUl) { htmlParts.push('<ul>'); inUl = true; }
                htmlParts.push('<li>' + renderInlineMarkdown(trimmed.replace(/^[-*]\s+/, '')) + '</li>');
                continue;
            }
            if (/^\d+\.\s+/.test(trimmed)) {
                if (inUl) { htmlParts.push('</ul>'); inUl = false; }
                if (!inOl) { htmlParts.push('<ol>'); inOl = true; }
                htmlParts.push('<li>' + renderInlineMarkdown(trimmed.replace(/^\d+\.\s+/, '')) + '</li>');
                continue;
            }
            closeLists();
            htmlParts.push('<p>' + renderInlineMarkdown(trimmed) + '</p>');
        }

        closeLists();

        var html = htmlParts.join('');
        for (var j = 0; j < codeBlocks.length; j++) {
            html = html.replace('%%CODEBLOCK_' + j + '%%', codeBlocks[j]);
        }
        return html || '<p></p>';
    }

    function addMessage(role, content, isError, asMarkdown) {
        var div = document.createElement('div');
        div.className = 'palladium-ai-msg ' + (isError ? 'error' : role);
        if (asMarkdown) {
            div.innerHTML = renderMarkdown(content);
        } else {
            div.textContent = content;
        }
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
    }

    function setMessage(div, content, asMarkdown) {
        if (!div) return;
        if (asMarkdown) {
            div.innerHTML = renderMarkdown(content);
        } else {
            div.textContent = content;
        }
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function slugToTitle(slug) {
        var base = String(slug || '').replace(/\.html$/i, '').replace(/[-_]+/g, ' ').trim();
        if (!base) return 'Unknown Game';
        var title = base.replace(/\b\w/g, function(ch) { return ch.toUpperCase(); });
        return title
            .replace(/\bFnaf\b/g, 'FNAF')
            .replace(/\bHtml\b/g, '')
            .trim();
    }

    function normalizeGamePath(rawHref, sourceTag, sourceBase) {
        if (!rawHref) return '';
        try {
            var url = new URL(rawHref, sourceBase || window.location.href);
            var path = url.pathname.replace(/^\/+/, '');

            if (sourceTag === 'games-page' && /game-player\.html$/i.test(path)) {
                var qp = new URLSearchParams(url.search || '');
                var gameParam = qp.get('game') || '';
                if (!gameParam) return '';
                try {
                    var gameUrl = new URL(gameParam, window.location.href);
                    path = gameUrl.pathname.replace(/^\/+/, '');
                } catch (_ignored) {
                    path = String(gameParam).replace(/^\/+/, '');
                }
            }

            if (sourceTag === 'games-dir' && path.indexOf('games/') !== 0) path = 'games/' + path;
            if (path.indexOf('games/') !== 0) return '';
            if (!/\.html$/i.test(path)) return '';
            if (/\/?game-player\.html$/i.test(path)) return '';
            return path;
        } catch (_err) {
            return '';
        }
    }

    function normalizeGamePlayerHref(rawHref) {
        if (!rawHref) return '';
        try {
            var url = new URL(rawHref, window.location.origin);
            if (!/game-player\.html$/i.test(url.pathname)) return '';
            return '/game-player.html' + (url.search || '');
        } catch (_err) {
            return '';
        }
    }

    function addGamesFromHtml(map, html, sourceTag, sourceBase) {
        if (!html) return;
        var doc = new DOMParser().parseFromString(html, 'text/html');
        var anchors = sourceTag === 'games-page'
            ? doc.querySelectorAll('a.game-card[href*="game-player.html"]')
            : doc.querySelectorAll('a[href]');
        Array.prototype.forEach.call(anchors, function(anchor) {
            var href = anchor.getAttribute('href') || '';
            var path = normalizeGamePath(href, sourceTag, sourceBase);
            if (!path) return;
            if (/\/?game-player\.html$/i.test(path)) return;
            var file = path.split('/').pop();
            var title = '';
            var author = 'Author: Unknown';
            var playerHref = '';

            if (sourceTag === 'games-page') {
                playerHref = normalizeGamePlayerHref(href);
                try {
                    var hrefUrl = new URL(href, sourceBase || window.location.href);
                    var qp = new URLSearchParams(hrefUrl.search || '');
                    title = (qp.get('title') || '').trim();
                    var parsedAuthor = (qp.get('author') || '').trim();
                    if (parsedAuthor) author = parsedAuthor;
                } catch (_ignored) {}
            }

            if (!title) {
                var h3 = anchor.querySelector('.game-info h3');
                if (h3 && h3.textContent) {
                    title = h3.textContent.replace(/\s+/g, ' ').trim();
                }
            }

            if (!title) {
                var rawLabel = (anchor.textContent || '').replace(/\s+/g, ' ').trim();
                title = rawLabel && rawLabel.length <= 80 && !/\.html$/i.test(rawLabel)
                    ? rawLabel
                    : slugToTitle(file);
            }

            map.set(path, { path: path, file: file, title: title, author: author, playerHref: playerHref });
        });
    }

    function gamePlayerHref(game) {
        if (game && game.playerHref) return game.playerHref;
        var title = (game && game.title) ? game.title : slugToTitle((game && game.file) || '');
        var author = (game && game.author) ? game.author : 'Author: Unknown';
        var path = (game && game.path) ? game.path : '';
        return '/game-player.html?game=' + encodeURIComponent(path) +
            '&title=' + encodeURIComponent(title) +
            '&author=' + encodeURIComponent(author);
    }

    async function gamePathExists(path) {
        if (!path) return false;
        var normalized = path.charAt(0) === '/' ? path : ('/' + path);
        try {
            var headRes = await fetch(normalized, { method: 'HEAD', cache: 'no-store' });
            if (headRes.ok) return true;
            if (headRes.status !== 405) return false;
        } catch (_ignoredHead) {}

        try {
            var getRes = await fetch(normalized, { method: 'GET', cache: 'no-store' });
            return !!(getRes && getRes.ok);
        } catch (_ignoredGet) {
            return false;
        }
    }

    function loadGameCatalog() {
        if (gamesCatalogPromise) return gamesCatalogPromise;
        gamesCatalogPromise = (async function() {
            var pageMap = new Map();

            try {
                var gamesPage = await fetch('/games.html', { cache: 'no-store' });
                if (gamesPage.ok) {
                    var gamesPageHtml = await gamesPage.text();
                    var gamesPageBase = gamesPage.url || (window.location.origin + '/games.html');
                    addGamesFromHtml(pageMap, gamesPageHtml, 'games-page', gamesPageBase);
                }
            } catch (_err2) {}

            var candidates = Array.from(pageMap.values());
            var checks = await Promise.all(candidates.map(function(game) {
                return gamePathExists(game.path);
            }));
            var filtered = candidates.filter(function(_g, idx) { return checks[idx]; });
            var list = (filtered.length ? filtered : candidates).sort(function(a, b) {
                return a.title.localeCompare(b.title);
            });
            lastLoadedGames = list;
            return list;
        })();
        return gamesCatalogPromise;
    }

    function normalizeForMatch(value) {
        return String(value || '')
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, ' ')
            .trim();
    }

    function gamesCatalogMarkdown(games, limit) {
        if (!games || !games.length) return 'No local games were found in `/games`.';
        var max = typeof limit === 'number' ? Math.max(1, limit) : games.length;
        var subset = games.slice(0, max);
        var lines = subset.map(function(game) {
            return '- [' + game.title + '](' + gamePlayerHref(game) + ')';
        });
        if (subset.length < games.length) {
            lines.push('- ...and ' + (games.length - subset.length) + ' more in `/games`.');
        }
        return lines.join('\n');
    }

    function isGamesQuery(text) {
        return /\b(game|games|fnaf|ragdoll|learn to fly)\b/i.test(text || '');
    }

    function isGamesListQuery(text) {
        if (!text) return false;
        return /\b(what|which|list|show|available|have)\b[\s\S]*\bgames?\b/i.test(text) ||
            /\bgames?\b[\s\S]*\b(available|have|list)\b/i.test(text);
    }

    function guessGameNameFromQuestion(text) {
        if (!text) return '';
        var m = text.match(/\b(?:do you have|is|play|got|has|have)\s+(.+?)(?:\?|$)/i);
        if (m && m[1]) return m[1].trim();
        return '';
    }

    function findGamesByName(games, query) {
        var q = normalizeForMatch(query);
        if (!q) return [];
        return (games || []).filter(function(game) {
            var title = normalizeForMatch(game.title);
            var file = normalizeForMatch(game.file);
            return title.indexOf(q) !== -1 || file.indexOf(q) !== -1 || q.indexOf(title) !== -1;
        });
    }

    function answerLocalGamesQuery(text, games) {
        if (!isGamesQuery(text)) return '';
        if (!games || !games.length) return 'I don\'t know based on the available data. I could not read `/games`.';

        if (isGamesListQuery(text)) {
            return 'Here are the games currently in `/games`:\n\n' + gamesCatalogMarkdown(games);
        }

        var guessed = guessGameNameFromQuestion(text);
        if (!guessed) return '';
        var matches = findGamesByName(games, guessed);
        if (matches.length === 0) {
            return 'I don\'t see **' + guessed + '** in `/games` right now.';
        }
        if (matches.length === 1) {
            return 'Yes. I found it in `/games`:\n\n- [' + matches[0].title + '](' + gamePlayerHref(matches[0]) + ')';
        }
        return 'I found multiple close matches in `/games`:\n\n' + gamesCatalogMarkdown(matches, 8);
    }

    function shouldUseInternet(text) {
        if (!internetEnabled) return false;
        if (!text) return false;
        return /\b(latest|today|news|update|updated|price|current|who is|look up|search|internet|recent)\b/i.test(text);
    }

    async function fetchInternetContext(query) {
        if (!shouldUseInternet(query)) return '';
        try {
            var url = searchApiUrl + '?q=' + encodeURIComponent(query) + '&limit=5';
            var res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) return '';
            var data = await res.json();
            if (!data || !Array.isArray(data.results) || !data.results.length) return '';
            var lines = data.results.map(function(item, idx) {
                var t = item.title || item.url || 'Untitled';
                var u = item.url || '';
                var s = item.snippet || '';
                var line = (idx + 1) + '. ' + t + (u ? ' - ' + u : '');
                if (s) line += '\n   ' + s;
                return line;
            });
            return 'Web search results for "' + query + '":\n' + lines.join('\n');
        } catch (_err) {
            return '';
        }
    }

    function buildMessages(userText, internetContext, games) {
        var recent = history.slice(-MAX_HISTORY_MESSAGES);
        var messages = [{ role: 'system', content: SYSTEM_PROMPT }];

        if (games && games.length && isGamesQuery(userText)) {
            messages.push({
                role: 'system',
                content: 'Local games catalog from `/games` (authoritative source):\n' + gamesCatalogMarkdown(games)
            });
        }

        if (internetContext) {
            messages.push({
                role: 'system',
                content: internetContext + '\nUse this context instead of guessing. If uncertain, say you are unsure.'
            });
        }

        return messages.concat(
            recent.map(function(m) {
                return { role: m.role, content: m.content };
            })
        );
    }

    function parseOllamaLine(line, currentText) {
        var text = currentText || '';
        if (!line) return text;
        try {
            var data = JSON.parse(line);
            if (data && data.message && typeof data.message.content === 'string') {
                return text + data.message.content;
            }
            if (data && typeof data.response === 'string') {
                return text + data.response;
            }
        } catch (_err) {}
        return text;
    }

    async function readOllamaReply(response, assistantBubble) {
        if (!response.body || !response.body.getReader) {
            var fallbackData = await response.json();
            var fallbackReply = (fallbackData.message && fallbackData.message.content)
                ? fallbackData.message.content
                : (fallbackData.response || 'No reply.');
            setMessage(assistantBubble, fallbackReply, true);
            return fallbackReply;
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffered = '';
        var reply = '';

        while (true) {
            var read = await reader.read();
            if (read.done) break;
            buffered += decoder.decode(read.value, { stream: true });
            var lines = buffered.split('\n');
            buffered = lines.pop() || '';
            for (var i = 0; i < lines.length; i++) {
                reply = parseOllamaLine(lines[i].trim(), reply);
                if (reply) setMessage(assistantBubble, reply, true);
            }
        }

        if (buffered.trim()) {
            reply = parseOllamaLine(buffered.trim(), reply);
        }

        if (!reply) reply = 'No reply.';
        setMessage(assistantBubble, reply, true);
        return reply;
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        var text = (input.value || '').trim();
        if (!text || sendBtn.disabled) return;

        input.value = '';
        addMessage('user', text, false, false);
        sendBtn.disabled = true;
        history.push({ role: 'user', content: text });
        setStatus('Thinking…', true);
        scheduleMemoryClear();

        var assistantBubble = addMessage('assistant', '...', false, true);
        var controller = (typeof AbortController !== 'undefined') ? new AbortController() : null;
        var timeout = controller ? setTimeout(function() { controller.abort(); }, RESPONSE_TIMEOUT_MS) : null;
        var internetContext = '';

        try {
            var games = await loadGameCatalog();
            var localGamesReply = answerLocalGamesQuery(text, games);
            if (localGamesReply) {
                setMessage(assistantBubble, localGamesReply, true);
                history.push({ role: 'assistant', content: localGamesReply });
                setStatus('Local catalog', true);
                scheduleMemoryClear();
                return;
            }

            internetContext = await fetchInternetContext(text);
            var messages = buildMessages(text, internetContext, games);

            var res = await fetch(apiBase + '/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                signal: controller ? controller.signal : undefined,
                body: JSON.stringify({
                    model: model,
                    messages: messages,
                    stream: true,
                    keep_alive: OLLAMA_KEEP_ALIVE
                })
            });
            if (!res.ok) throw new Error('API ' + res.status);
            var reply = await readOllamaReply(res, assistantBubble);
            history.push({ role: 'assistant', content: reply });
            setStatus('Ollama · ' + model, true);
            scheduleMemoryClear();
        } catch (_err) {
            assistantBubble.className = 'palladium-ai-msg assistant';
            var fallbackReply = internetContext
                ? ('I can\'t reach Ollama right now, but here are internet results from the local proxy:\n\n' + internetContext)
                : 'I can\'t reach Ollama right now.\n\nI don\'t know based on the available data.';
            setMessage(assistantBubble, fallbackReply, true);
            history.push({ role: 'assistant', content: fallbackReply });
            setStatus('Ollama offline — start Ollama', false);
            scheduleMemoryClear();
        } finally {
            if (timeout) clearTimeout(timeout);
            sendBtn.disabled = false;
            resizeInput();
            input.focus();
        }
    });

    if (newChatBtn) {
        newChatBtn.addEventListener('click', function() {
            history = [];
            messagesEl.innerHTML = '';
            setStatus('New chat started', true);
            if (memoryTimer) clearTimeout(memoryTimer);
            input.focus();
        });
    }

    input.addEventListener('input', resizeInput);
    input.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            if (typeof form.requestSubmit === 'function') {
                form.requestSubmit();
            } else {
                form.dispatchEvent(new Event('submit', { cancelable: true }));
            }
        }
    });

    resizeInput();
    loadGameCatalog().catch(function() {});
    showMode();
})();
    </script>
