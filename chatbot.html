    <style>
        /* Chat area fills entire viewport to the right of the nav strip from the start */
        body.iframe-page { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .chatbot-embed-wrap {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            left: var(--nav-strip-width);
            width: calc(100vw - var(--nav-strip-width));
            height: 100vh;
            transition: left var(--nav-strip-duration) var(--nav-strip-ease), width var(--nav-strip-duration) var(--nav-strip-ease);
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            overflow: hidden;
        }
        body.nav-expanded .chatbot-embed-wrap,
        html.nav-strip-expanded .chatbot-embed-wrap {
            left: var(--nav-strip-width);
            width: calc(100vw - var(--nav-strip-width));
        }
        .chatbot-embed-wrap iframe { flex: 1; width: 100%; height: 100%; border: none; display: block; }
        .chatbot-placeholder { padding: 2rem; max-width: 560px; margin: 2rem auto; text-align: center; color: var(--text-secondary); flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .chatbot-placeholder h2 { color: var(--text-primary); margin-bottom: 1rem; }
        .chatbot-placeholder a { color: #60a5fa; }
        .palladium-ai {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            flex: 1;
        }
        .palladium-ai-header { flex-shrink: 0; padding: 12px 20px; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: space-between; }
        .palladium-ai-header h2 { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin: 0; }
        .palladium-ai-status { font-size: 0.75rem; color: var(--text-secondary); }
        .palladium-ai-messages { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .palladium-ai-msg { max-width: 85%; align-self: flex-start; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .palladium-ai-msg.user { align-self: flex-end; background: #0e1520; color: #e2e8f0; }
        .palladium-ai-msg.assistant { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); }
        .palladium-ai-msg.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .palladium-ai-form { flex-shrink: 0; padding: 16px; border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.02); }
        .palladium-ai-form form { display: flex; gap: 10px; align-items: stretch; }
        .palladium-ai-form input { flex: 1; height: 50px; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 1rem; font-family: inherit; }
        .palladium-ai-form input:focus { outline: none; border-color: var(--text-primary); }
        .palladium-ai-form button { height: 50px; min-width: 50px; padding: 0 20px; background: #0e1520; color: #e2e8f0; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; justify-content: center; }
        .palladium-ai-form button:hover { background: #1e293b; }
        .palladium-ai-form button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>

    <script>(function(){var r=localStorage.getItem('navStripExpanded');if(r==='true'){var s=document.getElementById('navStrip');var t=document.getElementById('navStripToggle');if(s)s.classList.add('expanded');document.body.classList.add('nav-expanded');if(t)t.setAttribute('aria-expanded','true');}})();</script>
    <div class="chatbot-embed-wrap" id="chatbotWrap">
        <iframe id="chatbotFrame" title="AI Chatbot" style="display: none;"></iframe>
        <div class="chatbot-placeholder" id="chatbotPlaceholder" style="display: none;">
            <h2>PalladiumAI</h2>
            <p>Run <a href="https://ollama.com" target="_blank" rel="noopener">Ollama</a> locally and set <code>CHATBOT_API_URL</code> in <code>chatbot-config.js</code> (e.g. <code>http://localhost:11434</code>). See <code>CHATBOT_README.md</code>.</p>
        </div>
        <div class="palladium-ai" id="palladiumAi" style="display: none;">
            <div class="palladium-ai-header">
                <h2>PalladiumAI</h2>
                <span class="palladium-ai-status" id="palladiumAiStatus">Ollama</span>
            </div>
            <div class="palladium-ai-messages" id="palladiumAiMessages"></div>
            <div class="palladium-ai-form">
                <form id="palladiumAiForm">
                    <input type="text" id="palladiumAiInput" placeholder="Message PalladiumAI…" autocomplete="off">
                    <button type="submit" id="palladiumAiSend">Send</button>
                </form>
            </div>
        </div>
    </div>
    <script src="chatbot-config.js"></script>
    <script>
(function() {
    var apiBase = typeof CHATBOT_API_URL !== 'undefined' ? (CHATBOT_API_URL || '').replace(/\/$/, '') : '';
    var model = typeof CHATBOT_MODEL !== 'undefined' ? CHATBOT_MODEL : 'llama3.2';
    var iframeUrl = typeof CHATBOT_URL !== 'undefined' ? CHATBOT_URL : '';
    var frame = document.getElementById('chatbotFrame');
    var placeholder = document.getElementById('chatbotPlaceholder');
    var palladiumAi = document.getElementById('palladiumAi');
    var messagesEl = document.getElementById('palladiumAiMessages');
    var form = document.getElementById('palladiumAiForm');
    var input = document.getElementById('palladiumAiInput');
    var sendBtn = document.getElementById('palladiumAiSend');

    var SYSTEM_PROMPT = 'You are PalladiumAI for the Palladium Games site. Be helpful, accurate, and concise.';
    var history = [];
    var MAX_HISTORY_MESSAGES = 12;
    var RESPONSE_TIMEOUT_MS = 90000;
    var OLLAMA_KEEP_ALIVE = '30m';

    function setStatus(text, ok) {
        var el = document.getElementById('palladiumAiStatus');
        if (el) { el.textContent = text; el.style.color = ok ? 'var(--text-secondary)' : '#b91c1c'; }
    }

    function showMode() {
        if (apiBase) {
            palladiumAi.style.display = 'flex';
            if (frame) frame.style.display = 'none';
            if (placeholder) placeholder.style.display = 'none';
            fetch(apiBase + '/api/tags').then(function(r) { return r.ok ? r.json() : Promise.reject(); }).then(function() { setStatus('Ollama · ' + model, true); }).catch(function() { setStatus('Ollama offline — start Ollama', false); });
        } else if (iframeUrl && frame) {
            frame.src = iframeUrl;
            frame.style.display = 'block';
            palladiumAi.style.display = 'none';
            if (placeholder) placeholder.style.display = 'none';
        } else {
            if (placeholder) placeholder.style.display = 'block';
            palladiumAi.style.display = 'none';
            if (frame) frame.style.display = 'none';
        }
    }

    function addMessage(role, content, isError) {
        var div = document.createElement('div');
        div.className = 'palladium-ai-msg ' + (isError ? 'error' : role);
        div.textContent = content;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
    }

    function setMessage(div, content) {
        if (!div) return;
        div.textContent = content;
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function buildMessages() {
        var recent = history.slice(-MAX_HISTORY_MESSAGES);
        return [{ role: 'system', content: SYSTEM_PROMPT }].concat(
            recent.map(function(m) {
                return { role: m.role, content: m.content };
            })
        );
    }

    function parseOllamaLine(line, currentText) {
        var text = currentText || '';
        if (!line) return text;
        try {
            var data = JSON.parse(line);
            if (data && data.message && typeof data.message.content === 'string') {
                return text + data.message.content;
            }
            if (data && typeof data.response === 'string') {
                return text + data.response;
            }
        } catch (_err) {}
        return text;
    }

    async function readOllamaReply(response, assistantBubble) {
        if (!response.body || !response.body.getReader) {
            var fallbackData = await response.json();
            var fallbackReply = (fallbackData.message && fallbackData.message.content)
                ? fallbackData.message.content
                : (fallbackData.response || 'No reply.');
            setMessage(assistantBubble, fallbackReply);
            return fallbackReply;
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffered = '';
        var reply = '';

        while (true) {
            var read = await reader.read();
            if (read.done) break;
            buffered += decoder.decode(read.value, { stream: true });
            var lines = buffered.split('\n');
            buffered = lines.pop() || '';
            for (var i = 0; i < lines.length; i++) {
                reply = parseOllamaLine(lines[i].trim(), reply);
                if (reply) setMessage(assistantBubble, reply);
            }
        }

        if (buffered.trim()) {
            reply = parseOllamaLine(buffered.trim(), reply);
        }

        if (!reply) reply = 'No reply.';
        setMessage(assistantBubble, reply);
        return reply;
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        var text = (input.value || '').trim();
        if (!text || sendBtn.disabled) return;

        input.value = '';
        addMessage('user', text);
        sendBtn.disabled = true;
        history.push({ role: 'user', content: text });
        setStatus('Thinking…', true);

        var assistantBubble = addMessage('assistant', '...');
        var controller = (typeof AbortController !== 'undefined') ? new AbortController() : null;
        var timeout = controller ? setTimeout(function() { controller.abort(); }, RESPONSE_TIMEOUT_MS) : null;
        var messages = buildMessages();

        fetch(apiBase + '/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            signal: controller ? controller.signal : undefined,
            body: JSON.stringify({
                model: model,
                messages: messages,
                stream: true,
                keep_alive: OLLAMA_KEEP_ALIVE
            })
        }).then(function(res) {
            if (!res.ok) throw new Error('API ' + res.status);
            return readOllamaReply(res, assistantBubble);
        }).then(function(reply) {
            history.push({ role: 'assistant', content: reply });
            setStatus('Ollama · ' + model, true);
        }).catch(function() {
            assistantBubble.className = 'palladium-ai-msg error';
            setMessage(assistantBubble, 'Could not reach PalladiumAI. Is Ollama running at ' + apiBase + '?');
            setStatus('Ollama offline — start Ollama', false);
        }).finally(function() {
            if (timeout) clearTimeout(timeout);
            sendBtn.disabled = false;
            input.focus();
        });
    });

    showMode();
})();
    </script>
    <script src="nav-strip.js"></script>
</body>
