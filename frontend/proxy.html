    <main class="main">

            <div class="proxy-shell__controls">

            </div>
          </div>

          <div class="player-frame-wrap proxy-shell__frame" id="proxy-shell-frame-wrap">

  <script src="nav.js"></script>
  <script>
    (function () {
      var DEFAULT_PROXY_BASE = 'https://sethpang.com:1337';
      var STORAGE_KEY = 'palladium-proxy-base';

      var frame = document.getElementById('proxy-embed-frame');
      var serviceInput = document.getElementById('proxy-service-input');

      var params = new URLSearchParams(window.location.search);
      var initialUrl = params.get('url') || '';
      var initialProxy = params.get('proxy') || '';

      function normalizeBase(value) {
        var raw = String(value || '').trim();
        if (!raw) return '';
        if (!/^https?:\/\//i.test(raw)) {
          raw = 'http://' + raw;
        }
        raw = raw.replace(/\/+$/, '');
        try {
          var parsed = new URL(raw);
          return parsed.origin;
        } catch (e) {
          return '';
        }
      }

      function setStatus(message, isError) {
        /* Status UI removed; optional console for debugging */
        if (isError && message) console.warn('[proxy]', message);
      }

      function buildFrameSrc(base) {
        var target = base + '/';
        if (!initialUrl) return target;
        var qp = new URLSearchParams();
        qp.set('url', initialUrl);
        return target + '?' + qp.toString();
      }

      async function checkHealth(base) {
        try {
          var response = await fetch(base + '/health', { method: 'GET' });
          if (!response.ok) {
            setStatus('Proxy is online but returned status ' + response.status + '.', true);
            return;
          }
          setStatus('Connected to Palladium Scramjet at ' + base, false);
        } catch (error) {
          setStatus('Proxy is offline at ' + base + '. Start the backend Scramjet service.', true);
        }
      }

      function connect(baseValue, persist) {
        var base = normalizeBase(baseValue);
        if (!base) {
          setStatus('Enter a valid proxy URL (example: http://127.0.0.1:1337).', true);
          return;
        }

        if (persist && typeof localStorage !== 'undefined') {
          localStorage.setItem(STORAGE_KEY, base);
        }

        if (serviceInput) {
          serviceInput.value = base;
        }

        if (frame) {
          frame.src = buildFrameSrc(base);
        }

        setStatus('Connecting to ' + base + '...', false);
        checkHealth(base);
      }

      var stored = '';
      try {
        stored = localStorage.getItem(STORAGE_KEY) || '';
      } catch (e) {}

      var startupBase = normalizeBase(initialProxy) || normalizeBase(stored) || DEFAULT_PROXY_BASE;
      if (serviceInput) {
        serviceInput.value = startupBase;
      }
      connect(startupBase, false);

      if (serviceInput) {
        serviceInput.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            connect(serviceInput.value, true);
          }
        });
      }
    })();
  </script>
