<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function(){
      try {
        var stored = sessionStorage.getItem('palladium-nav-expanded');
        document.documentElement.classList.add(stored === '0' ? 'nav-initial-collapsed' : 'nav-initial-expanded');
      } catch (e) {}
    })();
  </script>
  <title>Play — Palladium Games</title>
  <link rel="icon" href="images/favicon.png?v=3" type="image/png" />
  <link rel="shortcut icon" href="favicon.ico?v=3" type="image/x-icon" />
  <link rel="apple-touch-icon" href="images/favicon.png?v=3" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <nav id="nav" class="nav">
      <div class="nav__toggle">
        <button type="button" id="nav-toggle" class="nav__toggle-btn" aria-label="Toggle menu">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
      <div class="nav__logo">
        <img src="images/favicon.png" alt="Palladium" class="nav__logo-icon" />
        <span class="nav__logo-text">PALLADIUM</span>
      </div>
      <div class="nav__links">
        <a href="index.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav__link-text">Home</span>
        </a>
        <a href="games.html" class="nav__link nav__link--active">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5h10a4 4 0 0 1 4 4v6a4 4 0 0 1-4 4h-1.6a2 2 0 0 1-1.6-.8l-.8-1.1a2 2 0 0 0-1.6-.8h-2.8a2 2 0 0 0-1.6.8l-.8 1.1A2 2 0 0 1 6.6 19H5a4 4 0 0 1-4-4V9a4 4 0 0 1 4-4h2z"/><path d="M7.5 12h3"/><path d="M9 10.5v3"/><circle cx="16.5" cy="11.5" r="1"/><circle cx="18.2" cy="13.2" r="1"/></svg>
          <span class="nav__link-text">Games</span>
        </a>
        <a href="proxy.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <span class="nav__link-text">Proxy</span>
        </a>
        <a href="ai.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="10" rx="3"/><path d="M12 8V4"/><path d="M8.5 4h7"/><circle cx="9.5" cy="13" r="1"/><circle cx="14.5" cy="13" r="1"/><path d="M9 16h6"/></svg>
          <span class="nav__link-text">AI</span>
        </a>
        <a href="music.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <span class="nav__link-text">Music</span>
        </a>
      </div>
    </nav>
    <main class="main">
      <div class="page page--player">
        <div id="player-wrap" class="player-wrap">
          <div class="player-frame-wrap" id="player-frame-wrap">
            <iframe id="game-frame" title="Game"></iframe>
          </div>
          <div class="player-bar">
            <div class="player-bar__info">
              <span id="player-title" class="player-bar__title">—</span>
              <span id="player-author" class="player-bar__author"></span>
            </div>
            <div class="player-bar__actions">
              <button type="button" id="player-fullscreen-btn" class="player-bar__btn" title="Fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                <span id="player-fullscreen-label">Fullscreen</span>
              </button>
              <a id="player-newtab-link" href="#" target="_blank" rel="noopener noreferrer" class="player-bar__btn" title="Open in new tab" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Open in new tab
              </a>
              <a href="games.html" class="player-bar__btn player-bar__back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Games
              </a>
            </div>
          </div>
        </div>
        <div id="player-empty" class="placeholder" style="display: none;">
          <div class="placeholder__box">
            <svg class="placeholder__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2" ry="2"/></svg>
            <h2 class="placeholder__title">No game selected</h2>
            <p class="placeholder__text">Choose a game from the Games page to play.</p>
            <a href="games.html" class="player-bar__btn player-bar__back" style="margin-top: 1rem; display: inline-flex;">Back to Games</a>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="backend.js"></script>
  <script src="nav.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var game = params.get('game');
      var title = params.get('title') || 'Unknown Game';
      var author = params.get('author') || '';

      var frame = document.getElementById('game-frame');
      var frameWrap = document.getElementById('player-frame-wrap');
      var wrap = document.getElementById('player-wrap');
      var empty = document.getElementById('player-empty');
      var titleEl = document.getElementById('player-title');
      var authorEl = document.getElementById('player-author');
      var fullscreenBtn = document.getElementById('player-fullscreen-btn');
      var newTabLink = document.getElementById('player-newtab-link');

      if (game && frame) {
        frame.src = game;
        document.title = decodeURIComponent(title.replace(/\+/g, ' ')) + ' — Palladium Games';
        if (titleEl) titleEl.textContent = decodeURIComponent(title.replace(/\+/g, ' '));
        if (authorEl) authorEl.textContent = author ? ' — ' + decodeURIComponent(author.replace(/\+/g, ' ')) : '';

        if (newTabLink) {
          newTabLink.href = game;
          newTabLink.style.display = 'inline-flex';
        }

        if (fullscreenBtn && frameWrap) {
          fullscreenBtn.addEventListener('click', function () {
            if (!document.fullscreenElement) {
              frameWrap.requestFullscreen().catch(function (err) { console.warn('Fullscreen failed:', err); });
            } else {
              document.exitFullscreen();
            }
          });
          document.addEventListener('fullscreenchange', function () {
            var label = document.getElementById('player-fullscreen-label');
            if (label) label.textContent = document.fullscreenElement ? 'Exit fullscreen' : 'Fullscreen';
          });
        }
      } else {
        wrap.style.display = 'none';
        empty.style.display = 'flex';
      }
    })();
  </script>
</body>
</html>
