[build]
  publish = "."
  command = "npm run verify"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/shell.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/site-storage.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/site-settings.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/social-client.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/scram/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/baremux/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/libcurl/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
