    <main class="main">
      <div class="page page--ai">
        <section class="ai-shell">
          <header class="ai-shell__header">
            <div>
              <h1 class="ai-shell__title">Palladium AI</h1>
              <p class="ai-shell__subtitle">Grounded to your games catalog and backend.</p>
            </div>
            <div id="ai-status" class="ai-shell__status">Connecting...</div>
          </header>
          <div id="ai-messages" class="ai-messages" aria-live="polite"></div>
          <form id="ai-form" class="ai-input-row">
            <textarea id="ai-input" class="ai-input" rows="1" placeholder="Ask anything..." enterkeyhint="send"></textarea>
            <button id="ai-send" type="submit" class="ai-send">Send</button>
          </form>
        </section>
      </div>
    </main>
  </div>
  <script src="site-settings.js"></script>
  <script src="backend.js"></script>
  <script src="nav.js"></script>
  <script>
    (function () {
      var statusEl = document.getElementById('ai-status');
      var messagesEl = document.getElementById('ai-messages');
      var form = document.getElementById('ai-form');
      var input = document.getElementById('ai-input');
      var sendButton = document.getElementById('ai-send');

      var memory = [];
      var maxMemoryItems = 6;
      var gamesCache = null;
      var busy = false;

      function setStatus(text, isError) {
        if (!statusEl) return;
        statusEl.textContent = String(text || '');
        statusEl.classList.toggle('ai-shell__status--error', Boolean(isError));
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function renderInlineMarkdown(text) {
        var safe = escapeHtml(text);
        safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
        safe = safe.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        safe = safe.replace(/\*(.*?)\*/g, '<em>$1</em>');
        return safe;
      }

      function renderMarkdown(text) {
        var lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
        var html = [];
        var inList = false;
        var inCode = false;
        var codeLines = [];

        function closeList() {
          if (inList) {
            html.push('</ul>');
            inList = false;
          }
        }

        for (var i = 0; i < lines.length; i += 1) {
          var line = lines[i];

          if (/^```/.test(line.trim())) {
            closeList();
            if (!inCode) {
              inCode = true;
              codeLines = [];
            } else {
              inCode = false;
              html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
              codeLines = [];
            }
            continue;
          }

          if (inCode) {
            codeLines.push(line);
            continue;
          }

          var listMatch = line.match(/^\s*[-*]\s+(.*)$/);
          if (listMatch) {
            if (!inList) {
              html.push('<ul>');
              inList = true;
            }
            html.push('<li>' + renderInlineMarkdown(listMatch[1]) + '</li>');
            continue;
          }

          closeList();

          var trimmed = line.trim();
          if (!trimmed) {
            html.push('<br>');
            continue;
          }

          if (/^###\s+/.test(trimmed)) {
            html.push('<h3>' + renderInlineMarkdown(trimmed.replace(/^###\s+/, '')) + '</h3>');
            continue;
          }

          if (/^##\s+/.test(trimmed)) {
            html.push('<h2>' + renderInlineMarkdown(trimmed.replace(/^##\s+/, '')) + '</h2>');
            continue;
          }

          if (/^#\s+/.test(trimmed)) {
            html.push('<h1>' + renderInlineMarkdown(trimmed.replace(/^#\s+/, '')) + '</h1>');
            continue;
          }

          html.push('<p>' + renderInlineMarkdown(trimmed) + '</p>');
        }

        if (inCode) {
          html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
        }

        if (inList) {
          html.push('</ul>');
        }

        return html.join('');
      }

      function addMessage(role, text) {
        if (!messagesEl) return;
        var bubble = document.createElement('article');
        bubble.className = 'ai-message ai-message--' + role;
        bubble.innerHTML = '<div class="ai-message__label">' + (role === 'user' ? 'You' : 'Palladium AI') + '</div><div class="ai-message__body">' + renderMarkdown(text) + '</div>';
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setBusy(value) {
        busy = Boolean(value);
        if (sendButton) sendButton.disabled = busy;
        if (input) input.disabled = busy;
      }

      function trimMemory() {
        if (memory.length > maxMemoryItems) {
          memory = memory.slice(memory.length - maxMemoryItems);
        }
      }

      function extractAssistantText(rawText) {
        var trimmed = String(rawText || '').trim();
        if (!trimmed) return '';

        try {
          var parsed = JSON.parse(trimmed);
          if (parsed && parsed.message && typeof parsed.message.content === 'string') {
            return parsed.message.content;
          }
        } catch (e) {
          // Ignore single JSON parse failures and try NDJSON.
        }

        var chunks = trimmed.split(/\r?\n/);
        var combined = '';
        for (var i = 0; i < chunks.length; i += 1) {
          var line = chunks[i].trim();
          if (!line) continue;
          try {
            var part = JSON.parse(line);
            if (part && part.message && typeof part.message.content === 'string') {
              combined += part.message.content;
            }
          } catch (e) {
            // Ignore malformed stream lines.
          }
        }
        return combined || trimmed;
      }

      async function getGamesCatalog() {
        if (gamesCache) return gamesCache;
        if (!window.PalladiumBackend) return [];
        try {
          var payload = await window.PalladiumBackend.fetchJson('/api/games');
          gamesCache = Array.isArray(payload && payload.games) ? payload.games : [];
          return gamesCache;
        } catch (error) {
          console.warn('Failed to load games catalog:', error);
          gamesCache = [];
          return gamesCache;
        }
      }

      function buildSystemPrompt(games) {
        var catalogLines = games.slice(0, 140).map(function (entry) {
          return '- ' + entry.title + ' by ' + entry.author;
        });

        return [
          'You are PalladiumAI for the Palladium Games website.',
          'Never make up games, links, authors, or site features.',
          'When users ask about games, use ONLY this catalog.',
          'If a requested game is missing from catalog, clearly say it is not listed.',
          'Keep answers concise and factual.',
          'Always format replies in Markdown.',
          '',
          'Catalog:',
          catalogLines.join('\n')
        ].join('\n');
      }

      async function sendChat(userText) {
        if (!window.PalladiumBackend) {
          throw new Error('Backend helper not loaded.');
        }

        var games = await getGamesCatalog();
        var system = buildSystemPrompt(games);

        var messages = [{ role: 'system', content: system }];
        for (var i = 0; i < memory.length; i += 1) {
          messages.push(memory[i]);
        }
        messages.push({ role: 'user', content: userText });

        var response = await fetch(window.PalladiumBackend.apiUrl('/api/ai/chat'), {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            stream: false,
            messages: messages,
            options: {
              temperature: 0.2,
              num_predict: 220
            }
          })
        });

        var raw = await response.text();
        if (!response.ok) {
          throw new Error(raw || ('AI request failed: ' + response.status));
        }
        return extractAssistantText(raw);
      }

      function autoGrow() {
        if (!input) return;
        input.style.height = '0px';
        var height = Math.max(52, Math.min(220, input.scrollHeight));
        input.style.height = height + 'px';
      }

      async function init() {
        setStatus('Connecting to backend...', false);
        addMessage('assistant', 'Hi, I am Palladium AI. Ask me about games or anything else.');

        if (!window.PalladiumBackend) {
          setStatus('Backend helper failed to load.', true);
          return;
        }

        try {
          var config = await window.PalladiumBackend.getPublicConfig();
          var model = config && config.services && config.services.defaultAiModel ? config.services.defaultAiModel : 'AI';
          getGamesCatalog().catch(function () {});
          setStatus('Online • ' + model, false);
        } catch (error) {
          setStatus('Backend offline: ' + String(error.message || error), true);
        }
      }

      if (input) {
        input.addEventListener('input', autoGrow);
        input.addEventListener('keydown', function (event) {
          if (event.isComposing) return;
          if (event.key === 'Enter' && !event.shiftKey && !event.ctrlKey && !event.metaKey && !event.altKey) {
            event.preventDefault();
            if (form) form.requestSubmit();
          }
        });
        autoGrow();
      }

      if (form) {
        form.addEventListener('submit', async function (event) {
          event.preventDefault();
          if (busy || !input) return;

          var text = String(input.value || '').trim();
          if (!text) return;

          addMessage('user', text);
          input.value = '';
          autoGrow();
          setBusy(true);
          setStatus('Thinking...', false);

          try {
            var answer = await sendChat(text);
            addMessage('assistant', answer || 'I could not generate a response.');

            memory.push({ role: 'user', content: text });
            memory.push({ role: 'assistant', content: answer });
            trimMemory();

            setStatus('Online', false);
          } catch (error) {
            console.error(error);
            addMessage('assistant', 'I hit an error reaching the backend AI.\n\n```text\n' + String(error.message || error) + '\n```');
            setStatus('Error: ' + String(error.message || error), true);
          } finally {
            setBusy(false);
            if (input) input.focus();
          }
        });
      }

      init();
    })();
  </script>
</body>
</html>
