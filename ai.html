<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function(){
      try {
        var stored = sessionStorage.getItem('palladium-nav-expanded');
        document.documentElement.classList.add(stored === '1' ? 'nav-initial-expanded' : 'nav-initial-collapsed');
      } catch (e) {}
    })();
  </script>
  <title>AI — Palladium Games</title>
  <link rel="icon" href="images/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="images/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <nav id="nav" class="nav">
      <div class="nav__toggle">
        <button type="button" id="nav-toggle" class="nav__toggle-btn" aria-label="Toggle menu">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 12h12"/><path d="M4 17h16"/></svg>
        </button>
      </div>
      <div class="nav__logo">
        <img src="images/favicon.png" alt="Palladium" class="nav__logo-icon" />
        <span class="nav__logo-text">PALLADIUM</span>
      </div>
      <div class="nav__links">
        <a href="index.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9 20v-5h6v5"/></svg>
          <span class="nav__link-text">Home</span>
        </a>
        <a href="games.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="9" rx="4.5"/><path d="M8 13h4"/><path d="M10 11v4"/><circle cx="15.5" cy="12.5" r="1"/><circle cx="18" cy="14.5" r="1"/></svg>
          <span class="nav__link-text">Games</span>
        </a>
        <a href="proxy.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M4.5 9h15"/><path d="M4.5 15h15"/><path d="M12 4a12 12 0 0 1 0 16"/><path d="M12 4a12 12 0 0 0 0 16"/></svg>
          <span class="nav__link-text">Proxy</span>
        </a>
        <a href="ai.html" class="nav__link nav__link--active">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="11" rx="3"/><path d="M12 7V4"/><path d="M9 4h6"/><circle cx="9.5" cy="12.5" r="1"/><circle cx="14.5" cy="12.5" r="1"/><path d="M8.5 15.5h7"/></svg>
          <span class="nav__link-text">AI</span>
        </a>
        <a href="music.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17.8V6.5l10-2V16"/><circle cx="7" cy="18" r="2.4"/><circle cx="17" cy="16" r="2.4"/></svg>
          <span class="nav__link-text">Music</span>
        </a>
      </div>
    </nav>
    <main class="main">
      <div class="page page--ai">
        <section class="ai-shell">
          <header class="ai-shell__header">
            <div>
              <h1 class="ai-shell__title">Palladium AI</h1>
              <p class="ai-shell__subtitle">Grounded to your games catalog and backend.</p>
            </div>
            <div id="ai-status" class="ai-shell__status">Connecting...</div>
          </header>
          <div id="ai-messages" class="ai-messages" aria-live="polite"></div>
          <form id="ai-form" class="ai-input-row">
            <textarea id="ai-input" class="ai-input" rows="1" placeholder="Ask anything..." enterkeyhint="send"></textarea>
            <button id="ai-send" type="submit" class="ai-send">Send</button>
          </form>
        </section>
      </div>
    </main>
  </div>
  <script src="site-settings.js"></script>
  <script src="backend.js"></script>
  <script src="nav.js"></script>
  <script>
    (function () {
      var statusEl = document.getElementById('ai-status');
      var messagesEl = document.getElementById('ai-messages');
      var form = document.getElementById('ai-form');
      var input = document.getElementById('ai-input');
      var sendButton = document.getElementById('ai-send');

      var memory = [];
      var maxMemoryItems = 2;
      var gamesCache = null;
      var busy = false;

      function setStatus(text, isError) {
        if (!statusEl) return;
        statusEl.textContent = String(text || '');
        statusEl.classList.toggle('ai-shell__status--error', Boolean(isError));
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function renderInlineMarkdown(text) {
        var safe = escapeHtml(text);
        safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
        safe = safe.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        safe = safe.replace(/\*(.*?)\*/g, '<em>$1</em>');
        return safe;
      }

      function renderMarkdown(text) {
        var lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
        var html = [];
        var inList = false;
        var inCode = false;
        var codeLines = [];

        function closeList() {
          if (inList) {
            html.push('</ul>');
            inList = false;
          }
        }

        for (var i = 0; i < lines.length; i += 1) {
          var line = lines[i];

          if (/^```/.test(line.trim())) {
            closeList();
            if (!inCode) {
              inCode = true;
              codeLines = [];
            } else {
              inCode = false;
              html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
              codeLines = [];
            }
            continue;
          }

          if (inCode) {
            codeLines.push(line);
            continue;
          }

          var listMatch = line.match(/^\s*[-*]\s+(.*)$/);
          if (listMatch) {
            if (!inList) {
              html.push('<ul>');
              inList = true;
            }
            html.push('<li>' + renderInlineMarkdown(listMatch[1]) + '</li>');
            continue;
          }

          closeList();

          var trimmed = line.trim();
          if (!trimmed) {
            html.push('<br>');
            continue;
          }

          if (/^###\s+/.test(trimmed)) {
            html.push('<h3>' + renderInlineMarkdown(trimmed.replace(/^###\s+/, '')) + '</h3>');
            continue;
          }

          if (/^##\s+/.test(trimmed)) {
            html.push('<h2>' + renderInlineMarkdown(trimmed.replace(/^##\s+/, '')) + '</h2>');
            continue;
          }

          if (/^#\s+/.test(trimmed)) {
            html.push('<h1>' + renderInlineMarkdown(trimmed.replace(/^#\s+/, '')) + '</h1>');
            continue;
          }

          html.push('<p>' + renderInlineMarkdown(trimmed) + '</p>');
        }

        if (inCode) {
          html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
        }

        if (inList) {
          html.push('</ul>');
        }

        return html.join('');
      }

      function addMessage(role, text) {
        if (!messagesEl) return null;
        var bubble = document.createElement('article');
        bubble.className = 'ai-message ai-message--' + role;
        bubble.innerHTML = '<div class="ai-message__label">' + (role === 'user' ? 'You' : 'Palladium AI') + '</div><div class="ai-message__body">' + renderMarkdown(text || '') + '</div>';
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
      }

      function updateMessageText(bubble, text) {
        if (!bubble) return;
        var body = bubble.querySelector('.ai-message__body');
        if (!body) return;
        body.innerHTML = renderMarkdown(text || '');
        if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setBusy(value) {
        busy = Boolean(value);
        if (sendButton) sendButton.disabled = busy;
        if (input) input.disabled = busy;
      }

      function trimMemory() {
        if (memory.length > maxMemoryItems) {
          memory = memory.slice(memory.length - maxMemoryItems);
        }
      }

      function extractAssistantText(rawText) {
        var trimmed = String(rawText || '').trim();
        if (!trimmed) return '';

        if (rawText && typeof rawText === 'object' && !Array.isArray(rawText)) {
          return contentFromParsed(rawText);
        }

        function contentFromParsed(parsed) {
          if (!parsed || typeof parsed !== 'object') return '';

          if (parsed.error && typeof parsed.error === 'string') {
            return '';
          }

          if (parsed.message && typeof parsed.message.content === 'string') {
            return parsed.message.content;
          }

          if (typeof parsed.response === 'string') {
            return parsed.response;
          }

          if (typeof parsed.content === 'string') {
            return parsed.content;
          }

          if (Array.isArray(parsed.choices) && parsed.choices.length) {
            var first = parsed.choices[0] || {};
            if (first.message && typeof first.message.content === 'string') {
              return first.message.content;
            }
            if (typeof first.text === 'string') {
              return first.text;
            }
          }

          return '';
        }

        try {
          var parsed = JSON.parse(trimmed);
          var direct = contentFromParsed(parsed);
          if (direct) return direct;
        } catch (e) {
          // Ignore single JSON parse failures and try NDJSON.
        }

        var chunks = trimmed.split(/\r?\n/);
        var combined = '';
        for (var i = 0; i < chunks.length; i += 1) {
          var line = chunks[i].trim();
          if (!line) continue;
          try {
            var part = JSON.parse(line);
            var segment = contentFromParsed(part);
            if (segment) {
              combined += segment;
            }
          } catch (e) {
            // Ignore malformed stream lines.
          }
        }
        return combined;
      }

      function extractErrorText(rawText) {
        var trimmed = String(rawText || '').trim();
        if (!trimmed) return '';

        try {
          var parsed = JSON.parse(trimmed);
          if (parsed && parsed.error && typeof parsed.error === 'string') {
            return parsed.error;
          }
        } catch (e) {
          // Ignore and attempt NDJSON.
        }

        var chunks = trimmed.split(/\r?\n/);
        for (var i = 0; i < chunks.length; i += 1) {
          var line = chunks[i].trim();
          if (!line) continue;
          try {
            var part = JSON.parse(line);
            if (part && part.error && typeof part.error === 'string') {
              return part.error;
            }
          } catch (e) {
            // Ignore malformed lines.
          }
        }

        return '';
      }

      async function requestAi(payload, onDelta) {
        var response = await fetch(window.PalladiumBackend.apiUrl('/api/ai/chat'), {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          var errRaw = await response.text();
          var upstream = extractErrorText(errRaw);
          throw new Error(upstream || errRaw || ('AI request failed: ' + response.status));
        }

        var wantsStream = Boolean(payload && payload.stream);
        if (wantsStream && response.body && typeof response.body.getReader === 'function') {
          var reader = response.body.getReader();
          var decoder = new TextDecoder();
          var buffer = '';
          var combined = '';

          function applySegment(segment) {
            if (!segment) return;
            combined += segment;
            if (typeof onDelta === 'function') {
              onDelta(combined, segment);
            }
          }

          while (true) {
            var chunk = await reader.read();
            if (chunk.done) break;
            buffer += decoder.decode(chunk.value, { stream: true });

            var newlineIndex = buffer.indexOf('\n');
            while (newlineIndex !== -1) {
              var line = buffer.slice(0, newlineIndex).trim();
              buffer = buffer.slice(newlineIndex + 1);
              if (line) {
                try {
                  var part = JSON.parse(line);
                  if (part && part.error) {
                    throw new Error(String(part.error));
                  }
                  if (part && part.done === true && typeof part.delta !== 'string') {
                    continue;
                  }

                  if (part && typeof part.delta === 'string') {
                    applySegment(part.delta);
                  } else {
                    var segment = extractAssistantText(part);
                    if (segment) {
                      applySegment(segment);
                    }
                  }
                } catch (error) {
                  if (error && error.message && String(error.message).trim()) {
                    if (/^{/.test(line) && !/Unexpected token|JSON/.test(String(error.message))) {
                      throw error;
                    }
                  }
                }
              }
              newlineIndex = buffer.indexOf('\n');
            }
          }

          var flushed = decoder.decode();
          if (flushed) {
            buffer += flushed;
          }
          if (String(buffer || '').trim()) {
              try {
                var tail = JSON.parse(buffer.trim());
                if (tail && tail.error) throw new Error(String(tail.error));
                if (tail && tail.done === true && typeof tail.delta !== 'string') {
                  return combined;
                }
                if (tail && typeof tail.delta === 'string') {
                  applySegment(tail.delta);
                } else {
                  var tailSegment = extractAssistantText(tail);
                  if (tailSegment) {
                    applySegment(tailSegment);
                  }
                }
              } catch (error) {
                // Ignore non-JSON trailing bytes.
              }
          }

          return combined;
        }

        var raw = await response.text();
        var upstreamError = extractErrorText(raw);
        if (upstreamError) throw new Error(upstreamError);
        return extractAssistantText(raw);
      }

      async function getGamesCatalog() {
        if (gamesCache) return gamesCache;
        if (!window.PalladiumBackend) return [];
        try {
          var payload = await window.PalladiumBackend.fetchJson('/api/games');
          gamesCache = Array.isArray(payload && payload.games) ? payload.games : [];
          return gamesCache;
        } catch (error) {
          console.warn('Failed to load games catalog:', error);
          gamesCache = [];
          return gamesCache;
        }
      }

      function isGameCatalogQuery(userText) {
        var text = String(userText || '').toLowerCase();
        if (!text) return false;
        return /\b(game|games|catalog|library|what do we have|what games|play|title|author)\b/.test(text);
      }

      function buildSystemPrompt(games, userText) {
        var includeCatalog = isGameCatalogQuery(userText);
        var lines = [
          'You are PalladiumAI for the Palladium Games website.',
          'Never make up games, links, authors, or site features.',
          'Always format replies in Markdown.',
          'Prefer short, direct answers.'
        ];

        if (!includeCatalog) {
          lines.push('If asked about the site game list, ask the user to re-ask and include "games" so you can use the live catalog.');
          return lines.join('\n');
        }

        var catalogLines = games.slice(0, 32).map(function (entry) {
          return '- ' + entry.title + ' | ' + entry.author + ' | ' + entry.playerPath;
        });

        if (games.length > 32) {
          lines.push('Catalog in this request is intentionally truncated for speed. Do not guess missing items.');
        }

        lines.push('When users ask about games, use ONLY this catalog.');
        lines.push('If a requested game is missing from catalog, clearly say it is not listed.');
        lines.push('');
        lines.push('Catalog:');
        lines.push(catalogLines.join('\n'));
        return lines.join('\n');
      }

      async function sendChat(userText, onProgress) {
        if (!window.PalladiumBackend) {
          throw new Error('Backend helper not loaded.');
        }

        var games = await getGamesCatalog();
        var system = buildSystemPrompt(games, userText);

        var messages = [{ role: 'system', content: system }];
        for (var i = 0; i < memory.length; i += 1) {
          messages.push(memory[i]);
        }
        messages.push({ role: 'user', content: userText });

        var primaryPayload = {
          stream: true,
          messages: messages,
          think: false,
          keep_alive: '30m',
          options: {
            temperature: 0.1,
            num_predict: 96,
            num_ctx: 1024
          }
        };

        var answer = await requestAi(primaryPayload, onProgress);
        if (String(answer || '').trim()) {
          return answer;
        }

        // Retry once with simpler payload for providers that ignore/strip options.
        var fallbackAnswer = await requestAi({
          stream: false,
          messages: messages
        });

        if (String(fallbackAnswer || '').trim()) {
          return fallbackAnswer;
        }

        throw new Error('AI returned an empty response.');
      }

      function autoGrow() {
        if (!input) return;
        input.style.height = '0px';
        var height = Math.max(52, Math.min(220, input.scrollHeight));
        input.style.height = height + 'px';
      }

      async function init() {
        setStatus('Connecting to backend...', false);
        addMessage('assistant', 'Hi, I am Palladium AI. Ask me about games or anything else.');

        if (!window.PalladiumBackend) {
          setStatus('Backend helper failed to load.', true);
          return;
        }

        try {
          var config = await window.PalladiumBackend.getPublicConfig();
          var model = config && config.services && config.services.defaultAiModel ? config.services.defaultAiModel : 'AI';
          getGamesCatalog().catch(function () {});
          setStatus('Online • ' + model, false);
        } catch (error) {
          setStatus('Backend offline: ' + String(error.message || error), true);
        }
      }

      if (input) {
        input.addEventListener('input', autoGrow);
        input.addEventListener('keydown', function (event) {
          if (event.isComposing) return;
          if (event.key === 'Enter' && !event.shiftKey && !event.ctrlKey && !event.metaKey && !event.altKey) {
            event.preventDefault();
            if (form) form.requestSubmit();
          }
        });
        autoGrow();
      }

      if (form) {
        form.addEventListener('submit', async function (event) {
          event.preventDefault();
          if (busy || !input) return;

          var text = String(input.value || '').trim();
          if (!text) return;

          addMessage('user', text);
          input.value = '';
          autoGrow();
          setBusy(true);
          setStatus('Thinking (fast mode)...', false);
          var liveAssistant = addMessage('assistant', '...');
          var gotProgress = false;

          try {
            var answer = await sendChat(text, function (partial) {
              gotProgress = true;
              setStatus('Streaming reply...', false);
              updateMessageText(liveAssistant, partial || '...');
            });
            if (!String(answer || '').trim()) {
              throw new Error('AI returned an empty response.');
            }
            updateMessageText(liveAssistant, answer);

            memory.push({ role: 'user', content: text });
            memory.push({ role: 'assistant', content: answer });
            trimMemory();

            setStatus(gotProgress ? 'Online • streamed' : 'Online', false);
          } catch (error) {
            console.error(error);
            updateMessageText(liveAssistant, 'I hit an error reaching the backend AI.\n\n```text\n' + String(error.message || error) + '\n```');
            setStatus('Error: ' + String(error.message || error), true);
          } finally {
            setBusy(false);
            if (input) input.focus();
          }
        });
      }

      init();
    })();
  </script>
</body>
</html>
