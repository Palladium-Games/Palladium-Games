<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chibi Knight</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1f2c4f, #060912 72%);
      color: #eef2ff;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    #ruffle-shell {
      flex: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    #ruffle-shell > * {
      flex: 1;
      width: 100%;
      height: 100%;
    }
  </style>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>
  <div id="ruffle-shell"></div>
  <script>
    (function () {
      var container = document.getElementById('ruffle-shell');
      if (!container || !window.RufflePlayer || typeof window.RufflePlayer.newest !== 'function') {
        document.body.innerHTML = '<p style="margin:auto;">Ruffle failed to load.</p>';
        return;
      }

      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      player.style.width = '100%';
      player.style.height = '100%';
      player.config = {
        autoplay: 'on',
        unmuteOverlay: 'hidden',
        splashScreen: false
      };
      container.appendChild(player);
      player.load('/swf/chibi-knight.swf');
    })();
  </script>
</body>
</html>
