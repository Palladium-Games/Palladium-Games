<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palladium Browse</title>
    <style>
      :root {
        --bg: #0b0d10;
        --panel: #12161c;
        --border: rgba(255, 255, 255, 0.12);
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #3b82f6;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Outfit", "Segoe UI", sans-serif;
        overflow: hidden;
      }

      .proxy-app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
        gap: 10px;
        padding: 12px;
        background:
          radial-gradient(100% 120% at 100% 0%, rgba(59, 130, 246, 0.12), transparent 45%),
          radial-gradient(120% 140% at 0% 100%, rgba(16, 185, 129, 0.08), transparent 42%),
          var(--bg);
      }

      .proxy-tabs {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        padding: 6px;
        overflow-x: auto;
        overflow-y: hidden;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.24);
      }

      .proxy-tab {
        min-width: 180px;
        max-width: 260px;
        height: 32px;
        display: flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: #0f141c;
        overflow: hidden;
        flex: 0 0 auto;
      }

      .proxy-tab.is-active {
        border-color: rgba(59, 130, 246, 0.9);
        background: linear-gradient(180deg, rgba(59, 130, 246, 0.24), rgba(15, 20, 28, 0.86));
      }

      .proxy-tab__main {
        all: unset;
        min-width: 0;
        flex: 1;
        height: 100%;
        padding: 0 8px;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }

      .proxy-tab__favicon {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        flex: 0 0 auto;
      }

      .proxy-tab__title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.78rem;
        color: var(--muted);
      }

      .proxy-tab.is-active .proxy-tab__title {
        color: var(--text);
      }

      .proxy-tab__close {
        all: unset;
        width: 30px;
        height: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        cursor: pointer;
      }

      .proxy-tab__close:hover {
        color: #fda4af;
        background: rgba(248, 113, 113, 0.15);
      }

      .proxy-tab-add {
        all: unset;
        width: 32px;
        height: 32px;
        border: 1px solid var(--border);
        border-radius: 9px;
        color: var(--text);
        background: #10141a;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex: 0 0 auto;
      }

      .proxy-tab-add:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .proxy-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      }

      .proxy-btn {
        border: 1px solid var(--border);
        background: #10141a;
        color: var(--text);
        width: 34px;
        height: 34px;
        border-radius: 10px;
        font-size: 15px;
        line-height: 1;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }

      .proxy-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        transform: translateY(-1px);
      }

      .proxy-form {
        width: 100%;
      }

      .proxy-input {
        flex: 1;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #0d1117;
        color: var(--text);
        height: 34px;
        padding: 0 12px;
        font-size: 0.95rem;
        outline: none;
      }

      .proxy-input:focus {
        border-color: var(--accent);
      }

      .proxy-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        padding: 0 10px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      }

      .proxy-meta__favicon {
        width: 16px;
        height: 16px;
        border-radius: 4px;
      }

      .proxy-meta__title {
        color: var(--muted);
        font-size: 0.82rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .proxy-frame-host {
        min-height: 0;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: #05070a;
        box-shadow: inset 0 0 0 1px rgba(59, 130, 246, 0.08), 0 18px 44px rgba(0, 0, 0, 0.36);
      }

      .proxy-frame-host iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      .proxy-frame-host iframe.is-hidden {
        display: none;
      }

      .proxy-status {
        min-height: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 8px;
      }

      .proxy-status__text {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .proxy-status__text.is-error {
        color: #f87171;
      }

      @media (max-width: 740px) {
        .proxy-tab {
          min-width: 150px;
        }

        .proxy-toolbar {
          flex-wrap: wrap;
        }

        .proxy-input {
          min-width: 180px;
          width: 100%;
        }
      }
    </style>
    <script src="/scram/scramjet.all.js"></script>
  </head>
  <body>
    <div class="proxy-app">
      <div id="tabs-strip" class="proxy-tabs" role="tablist" aria-label="Browser tabs">
        <button type="button" id="new-tab-btn" class="proxy-tab-add" title="New tab">+</button>
      </div>

      <form id="proxy-form" class="proxy-toolbar proxy-form" autocomplete="off">
        <button type="button" id="back-btn" class="proxy-btn" title="Back">&#8592;</button>
        <button type="button" id="forward-btn" class="proxy-btn" title="Forward">&#8594;</button>
        <button type="button" id="reload-btn" class="proxy-btn" title="Reload">&#x21bb;</button>
        <button type="button" id="home-btn" class="proxy-btn" title="Home">&#8962;</button>
        <input
          id="url-input"
          class="proxy-input"
          type="text"
          name="url"
          placeholder="Search the web or enter a URL"
          spellcheck="false"
          autocapitalize="none"
          autocorrect="off"
        />
      </form>

      <div class="proxy-meta" aria-live="polite">
        <img id="site-favicon" class="proxy-meta__favicon" src="" alt="" />
        <span id="site-title" class="proxy-meta__title">Palladium Browse</span>
      </div>

      <div id="frame-host" class="proxy-frame-host"></div>

      <div class="proxy-status">
        <span id="status-text" class="proxy-status__text">Loading proxy runtime...</span>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
