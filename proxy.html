<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Browser - Palladium Games</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="proxy-page iframe-page">
    <div class="sidebar-menu">
        <div class="sidebar-logo">P</div>
        <div class="sidebar-separator"></div>
        <div class="sidebar-content" id="sidebarContent">
            <a href="index.html" class="sidebar-link" title="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </a>
            <a href="games.html" class="sidebar-link" title="Games">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="2" width="12" height="20" rx="2"/>
                    <path d="M12 18h.01"/>
                </svg>
            </a>
            <a href="proxy.html" class="sidebar-link active" title="Proxy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </a>
        </div>
    </div>
    <div class="iframe-wrapper">
        <div class="iframe-container proxy-embed-wrap">
            <div class="browser-container">
                <div class="browser-content">
                    <iframe id="browserFrame" class="browser-frame" title="Proxy browser"></iframe>
                    <div id="browserLoading" class="browser-loading" style="display: none;">
                        <div class="browser-spinner"></div>
                        <p>Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="proxy.js"></script>
</body>
</html>
