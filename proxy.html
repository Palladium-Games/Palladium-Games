<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Browser - Platinum Games</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="proxy-page iframe-page">
    <div class="sidebar-menu">
        <div class="sidebar-logo">P</div>
        <div class="sidebar-separator"></div>
        <div class="sidebar-content" id="sidebarContent">
            <a href="index.html" class="sidebar-link" title="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </a>
            <a href="games.html" class="sidebar-link" title="Games">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="2" width="12" height="20" rx="2"/>
                    <path d="M12 18h.01"/>
                </svg>
            </a>
            <a href="proxy.html" class="sidebar-link active" title="Proxy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </a>
        </div>
    </div>
    <div class="iframe-wrapper">
        <div class="iframe-container">
            <div class="browser-container">
                <div class="browser-toolbar">
            <div class="browser-nav-buttons">
                <button class="browser-btn" id="browserBack" title="Back" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <button class="browser-btn" id="browserForward" title="Forward" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
                <button class="browser-btn" id="browserRefresh" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    </svg>
                </button>
                <button class="browser-btn" id="browserHome" title="Home">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </button>
            </div>
            <div class="browser-address-bar-wrapper">
                <form id="browserAddressForm" class="browser-address-bar">
                    <svg class="browser-lock-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="text" id="browserAddressInput" class="browser-address-input" placeholder="Enter URL or search..." autocomplete="off">
                    <button type="submit" class="browser-go-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </form>
            </div>
            <div class="browser-menu">
                <a href="index.html" class="browser-menu-link">Home</a>
                <a href="games.html" class="browser-menu-link">Games</a>
            </div>
        </div>
        <div class="browser-content">
            <iframe id="browserFrame" class="browser-frame" src="about:blank"></iframe>
            <div id="browserLoading" class="browser-loading" style="display: none;">
                <div class="browser-spinner"></div>
                <p>Loading...</p>
            </div>
                </div>
            </div>
        </div>
    </div>
    <script src="proxy.js"></script>
</body>
</html>
