    <main class="main">
      <div class="page page--proxy-clean">
        <div class="proxy-clean-shell">
          <div class="proxy-clean-top">
            <h1 class="proxy-clean-title">Palladium Browse</h1>
            <div id="proxy-status" class="proxy-shell__status">Connecting...</div>
          </div>
          <div class="proxy-clean-frame-wrap">
            <iframe id="proxy-embed-frame" title="Palladium Browse"></iframe>
          </div>
          <div id="proxy-fallback" class="proxy-fallback" style="display: none;">
            <h2>Proxy failed to load</h2>
            <p id="proxy-fallback-text">The Scramjet UI is not available right now.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="site-settings.js"></script>
  <script src="backend.js"></script>
  <script src="nav.js"></script>
  <script>
    (function () {
      var DEFAULT_PROXY_PORT = 1337;
      var frame = document.getElementById('proxy-embed-frame');
      var statusEl = document.getElementById('proxy-status');
      var fallbackEl = document.getElementById('proxy-fallback');
      var fallbackTextEl = document.getElementById('proxy-fallback-text');

      var params = new URLSearchParams(window.location.search);
      var initialUrl = params.get('url') || '';
      var initialProxy = params.get('proxy') || '';

      function normalizeBase(value) {
        var raw = String(value || '').trim();
        if (!raw) return '';
        if (!/^https?:\/\//i.test(raw)) {
          raw = 'http://' + raw;
        }
        raw = raw.replace(/\/+$/, '');
        try {
          var parsed = new URL(raw);
          return parsed.origin;
        } catch (e) {
          return '';
        }
      }

      function normalizeTarget(input) {
        var raw = String(input || '').trim();
        if (!raw) return '';
        if (/^https?:\/\//i.test(raw)) return raw;
        if (/^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(raw)) return 'https://' + raw;
        return 'https://duckduckgo.com/?q=' + encodeURIComponent(raw);
      }

      function setStatus(message, isError) {
        if (!statusEl) {
          if (isError && message) console.warn('[proxy]', message);
          return;
        }
        statusEl.textContent = String(message || '');
        statusEl.classList.toggle('proxy-shell__status--error', Boolean(isError));
      }

      function buildFrameSrc(base, targetUrl) {
        var target = base + '/';
        if (!targetUrl) return target;
        var qp = new URLSearchParams();
        qp.set('url', targetUrl);
        return target + '?' + qp.toString();
      }

      function showFallback(message) {
        if (fallbackTextEl) fallbackTextEl.textContent = message;
        if (fallbackEl) fallbackEl.style.display = 'grid';
      }

      async function validateProxyUi(base) {
        try {
          var response = await fetch(base + '/', { method: 'GET' });
          if (!response.ok) return false;
          var contentType = String(response.headers.get('content-type') || '').toLowerCase();
          return contentType.indexOf('text/html') !== -1;
        } catch (error) {
          return false;
        }
      }

      async function checkHealth(base) {
        try {
          var response = await fetch(base + '/health', { method: 'GET' });
          if (!response.ok) {
            return { ok: false, message: 'Proxy health endpoint returned status ' + response.status + '.' };
          }
          var uiOk = await validateProxyUi(base);
          if (!uiOk) {
            return { ok: false, message: 'Proxy endpoint is reachable, but UI route / is returning invalid content.' };
          }
          return { ok: true, message: 'Connected to Scramjet at ' + base };
        } catch (error) {
          return { ok: false, message: 'Proxy is offline at ' + base + '. Start or restart the backend.' };
        }
      }

      async function resolveProxyBase() {
        var explicit = normalizeBase(initialProxy);
        if (explicit) return explicit;

        if (window.PalladiumBackend && typeof window.PalladiumBackend.getPublicConfig === 'function') {
          try {
            var config = await window.PalladiumBackend.getPublicConfig();
            var fromConfig = normalizeBase(config && config.services && config.services.scramjetBase);
            if (fromConfig) return fromConfig;
          } catch (error) {
            console.warn('Failed to load backend config:', error);
          }
        }

        if (window.PalladiumBackend && typeof window.PalladiumBackend.getBaseUrl === 'function') {
          var backendBase = normalizeBase(window.PalladiumBackend.getBaseUrl());
          if (backendBase) {
            try {
              var parsed = new URL(backendBase);
              parsed.port = String(DEFAULT_PROXY_PORT);
              return parsed.origin;
            } catch (error) {
              // Ignore and continue.
            }
          }
        }

        try {
          var fallback = new URL(window.location.origin);
          fallback.port = String(DEFAULT_PROXY_PORT);
          return fallback.origin;
        } catch (error) {
          return '';
        }
      }

      function connect(baseValue, targetUrl) {
        var base = normalizeBase(baseValue);
        if (!base) {
          setStatus('Invalid proxy URL configuration.', true);
          showFallback('Invalid proxy URL configuration.');
          return;
        }

        if (frame) {
          frame.src = buildFrameSrc(base, targetUrl || '');
        }

        return checkHealth(base).then(function (result) {
          if (!result.ok) {
            setStatus(result.message, true);
            showFallback(result.message);
            return;
          }
          setStatus(result.message, false);
        });
      }

      (async function init() {
        var resolvedBase = await resolveProxyBase();
        var startupTarget = normalizeTarget(initialUrl);
        await connect(resolvedBase, startupTarget);
      })();
    })();
  </script>
</body>
</html>
