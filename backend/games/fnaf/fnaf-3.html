    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100% !important; height: 100% !important; overflow: hidden; background: #000 !important; position: relative !important; }
        .fnaf3-canvas-wrap { position: absolute !important; inset: 0 !important; left: 0 !important; top: 0 !important; right: 0 !important; bottom: 0 !important; }
        #MMFCanvas { display: block !important; background: #000 !important; width: 100% !important; height: 100% !important; position: absolute !important; left: 0 !important; top: 0 !important; right: 0 !important; bottom: 0 !important; }
        #progress-container { position: fixed !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%); color: #fff; text-align: center; z-index: 10; }
    </style>

<body>
    <div class="fnaf3-canvas-wrap">
        <canvas id="MMFCanvas" width="1280" height="720">Your browser does not support Canvas, Please try again.</canvas>
    </div>
    <div id="progress-container">
        <div style="margin-bottom: 6px;">Downloading... <span id="download-text">0%</span></div>
        <div style="width: 100%; background: #444; border-radius: 6px; overflow: hidden;">
            <div id="download-bar" style="height: 10px; background: #3b82f6; width: 0%; transition: width 0.2s;"></div>
        </div>
        <div style="margin: 12px 0 6px;">Extracting... <span id="extract-text">0%</span></div>
        <div style="width: 100%; background: #444; border-radius: 6px; overflow: hidden;">
            <div id="extract-bar" style="height: 10px; background: #10b981; width: 0%; transition: width 0.2s;"></div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="main.js"></script>
    <script>(function(){function h(){var d=document.getElementById('download-text'),e=document.getElementById('extract-text'),c=document.getElementById('progress-container');if(!c)return;var dd=d&&/100\s*%/.test(d.textContent||''),ee=!e||/100\s*%/.test(e.textContent||'');if(dd&&ee){c.style.display='none';return true;}return false;}var n=0,iv=setInterval(function(){if(h()||++n>=120)clearInterval(iv);},500);})();</script>
