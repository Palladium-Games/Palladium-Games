# Server
server.host=0.0.0.0
server.port=8080
cors.origin=https://your-frontend.example.com

# Paths (relative to backend/ when running the JAR)
frontend.dir=../frontend
games.dir=../games

# AI / proxy
ollama.base.url=http://127.0.0.1:11434
ollama.model=qwen3.5:0.8b
request.timeout.seconds=25
ai.max.request.body.bytes=131072
proxy.block.private.network.targets=true

# Security
security.trust.proxy.headers=false
security.rate.limit.enabled=true
security.rate.limit.window.seconds=60
security.rate.limit.proxy.requests=120
security.rate.limit.ai.requests=30

# Scramjet sidecar (auto-started by the backend JAR)
scramjet.autostart=true
scramjet.node.command=node
scramjet.service.dir=../scramjet-service
scramjet.host=0.0.0.0
scramjet.port=1337
scramjet.startup.timeout.seconds=20

# Discord bot config
discord.commit.bot.token=
discord.link.bot.token=
discord.community.bot.token=

