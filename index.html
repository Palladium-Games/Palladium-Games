<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Palladium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" href="images/favicon.png?v=4" type="image/png" />
  <link rel="shortcut icon" href="favicon.ico?v=4" type="image/x-icon" />
  <link rel="apple-touch-icon" href="images/favicon.png?v=4" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="settings-shell.css" />
</head>
<body>
  <div id="shell-root" class="shell">
    <aside id="shell-sidebar" class="shell-sidebar">
      <div class="shell-sidebar__brand shell-sidebar__row">
        <div class="shell-sidebar__rail">
          <div class="shell-sidebar__logo-mark" aria-hidden="true">
            <img src="images/favicon.png" alt="" class="shell-sidebar__logo-image" />
          </div>
        </div>
        <div class="shell-sidebar__rest shell-sidebar__rest--brand">
          <h1 class="shell-sidebar__title">PALLADIUM</h1>
        </div>
      </div>

      <div class="sidebar-toggle-row">
        <button type="button" id="sidebar-toggle" class="sidebar-toggle-btn" aria-expanded="true">
          <span class="sidebar-toggle-btn__rail" aria-hidden="true">
            <svg class="ui-icon" viewBox="0 0 24 24">
              <path d="M9 6l6 6-6 6" />
            </svg>
          </span>
          <span class="sidebar-toggle-btn__label">
            <span class="sidebar-toggle-btn__word">Retract</span>
            <span class="sidebar-toggle-btn__lt">&lt;</span>
          </span>
        </button>
      </div>

      <section class="sidebar-block sidebar-block--tabs">
        <div class="sidebar-block__header sidebar-block__header--tabs shell-sidebar__row">
          <div class="shell-sidebar__rail">
            <button type="button" id="shell-new-tab" class="sidebar-block__action sidebar-block__action--icon" aria-label="New tab" title="New tab">
              <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>
          </div>
          <div class="shell-sidebar__rest shell-sidebar__rest--header">
            <span class="sidebar-block__heading">Tabs</span>
          </div>
        </div>
        <div id="tab-list" class="tab-list" aria-live="polite"></div>
      </section>

      <section class="sidebar-block sidebar-block--links">
        <div class="sidebar-block__header shell-sidebar__row">
          <div class="shell-sidebar__rail shell-sidebar__rail--spacer" aria-hidden="true"></div>
          <div class="shell-sidebar__rest shell-sidebar__rest--header">
            <span class="sidebar-block__heading">Links</span>
          </div>
        </div>
        <div class="route-list">
          <button type="button" class="route-link" data-route="palladium://home">
            <svg class="ui-icon route-link__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 11.5 12 4l9 7.5M6.5 10.5V20h11V10.5" />
            </svg>
            <span class="route-link__label">Home</span>
          </button>
          <button type="button" class="route-link" data-route="palladium://games">
            <svg class="ui-icon route-link__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.5 9h11a3.5 3.5 0 0 1 3.5 3.5v0A3.5 3.5 0 0 1 17.5 16H6.5A3.5 3.5 0 0 1 3 12.5v0A3.5 3.5 0 0 1 6.5 9Z" />
              <path d="M8.5 12.5h3M10 11v3M15.5 12h0M17.5 13.5h0" />
            </svg>
            <span class="route-link__label">Games</span>
          </button>
          <button type="button" class="route-link" data-route="palladium://ai">
            <svg class="ui-icon route-link__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v4M12 17v4M4.8 7.2l2.8 2.8M16.4 14.8l2.8 2.8M3 12h4M17 12h4M4.8 16.8l2.8-2.8M16.4 9.2l2.8-2.8" />
              <circle cx="12" cy="12" r="4" />
            </svg>
            <span class="route-link__label">AI</span>
          </button>
          <button type="button" class="route-link" data-route="palladium://settings">
            <svg class="ui-icon route-link__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3.5 14 5l2.5-.2 1 2.3 2 1.5-.8 2.4.8 2.4-2 1.5-1 2.3L14 19l-2 1.5L10 19l-2.5.2-1-2.3-2-1.5.8-2.4-.8-2.4 2-1.5 1-2.3L10 5l2-1.5Z" />
              <circle cx="12" cy="12" r="3.2" />
            </svg>
            <span class="route-link__label">Settings</span>
          </button>
        </div>
      </section>

    </aside>

    <main class="shell-main">
      <header class="shell-toolbar">
        <form id="address-form" class="address-bar">
          <div class="shell-toolbar__controls">
            <button type="button" id="toolbar-home" class="toolbar-button toolbar-button--icon" aria-label="Home" title="Home">
              <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 11.5 12 4l9 7.5M6.5 10.5V20h11V10.5" />
              </svg>
            </button>
            <button type="button" id="toolbar-refresh" class="toolbar-button toolbar-button--icon" aria-label="Refresh" title="Refresh">
              <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 5v5h-5" />
                <path d="M20 10a8 8 0 1 0 2 5.3" />
              </svg>
            </button>
          </div>
          <label for="address-input" class="sr-only">Palladium address bar</label>
          <input
            id="address-input"
            class="address-bar__input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="none"
            placeholder="Enter a URL, search term, or palladium:// route"
          />
          <button type="submit" class="address-bar__submit">Go</button>
        </form>
      </header>

      <section id="shell-stage" class="shell-stage">
        <div id="pane-stack" class="pane-stack"></div>
        <div id="stage-overlay" class="stage-overlay" hidden>
          <div class="stage-overlay__content">
            <p class="stage-overlay__eyebrow">Proxy status</p>
            <h2 class="stage-overlay__title">The proxy is not reachable right now.</h2>
            <p id="stage-overlay-text" class="stage-overlay__text">
              Check the backend transport at api.sethpang.com and try again.
            </p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <template id="home-pane-template">
    <section class="shell-pane shell-pane--internal shell-pane--home">
      <div class="hero-panel">
        <p class="hero-panel__eyebrow">palladium://newtab</p>
        <h2 class="hero-panel__title">A cooler built-in browser shell for Palladium.</h2>
        <p class="hero-panel__text">
          The main screen is the proxy now. Scramjet runs right inside the shell, internal tabs live
          in the browser chrome, and the live backend stays tucked away at api.sethpang.com.
        </p>
        <div class="hero-panel__actions">
          <button type="button" class="hero-action" data-route="palladium://games">Open Games</button>
          <button type="button" class="hero-action" data-route="palladium://ai">Open AI</button>
          <button type="button" class="hero-action hero-action--muted" data-query="news games">
            Search Web
          </button>
        </div>
      </div>

      <div class="home-grid">
        <section class="content-card">
          <div class="content-card__header">
            <div>
              <p class="content-card__eyebrow">Quick routes</p>
              <h3 class="content-card__title">Launch pads</h3>
            </div>
          </div>
          <div class="shortcut-grid">
            <button type="button" class="shortcut-card" data-route="palladium://home">
              <span class="shortcut-card__title">Home</span>
            </button>
            <button type="button" class="shortcut-card" data-route="palladium://games">
              <span class="shortcut-card__title">Games</span>
            </button>
            <button type="button" class="shortcut-card" data-route="palladium://ai">
              <span class="shortcut-card__title">AI</span>
            </button>
            <button type="button" class="shortcut-card" data-route="palladium://settings">
              <span class="shortcut-card__title">Settings</span>
            </button>
            <button type="button" class="shortcut-card" data-query="speed test">
              <span class="shortcut-card__title">Search</span>
            </button>
          </div>
        </section>

        <section class="content-card">
          <div class="content-card__header">
            <div>
              <p class="content-card__eyebrow">Library picks</p>
              <h3 class="content-card__title">Play something fast</h3>
            </div>
          </div>
          <div class="mini-game-grid" data-role="home-library"></div>
        </section>
      </div>
    </section>
  </template>

  <template id="games-pane-template">
    <section class="shell-pane shell-pane--internal shell-pane--games">
      <div class="section-hero">
        <div>
          <p class="section-hero__eyebrow">palladium://games</p>
          <h2 class="section-hero__title">Game Library</h2>
          <p class="section-hero__text">Search the catalog and launch any game into its own tab.</p>
        </div>
        <div class="section-hero__status" data-role="games-status">Loading local catalog...</div>
      </div>

      <label class="search-field">
        <span class="sr-only">Search games</span>
        <input
          class="search-field__input games-search-input"
          type="search"
          placeholder="Search games, authors, or categories"
          autocomplete="off"
        />
      </label>

      <section class="content-card">
        <div class="content-card__header">
          <div>
            <p class="content-card__eyebrow">Featured today</p>
            <h3 class="content-card__title">Quick launch</h3>
          </div>
        </div>
        <div class="featured-launch" data-role="games-featured"></div>
      </section>

      <section class="content-card">
        <div class="content-card__header">
          <div>
            <p class="content-card__eyebrow">Full library</p>
            <h3 class="content-card__title">Every local game</h3>
          </div>
        </div>
        <div class="game-grid" data-role="games-grid"></div>
      </section>
    </section>
  </template>

  <template id="ai-pane-template">
    <section class="shell-pane shell-pane--internal shell-pane--ai">
      <div class="section-hero">
        <div>
          <p class="section-hero__eyebrow">palladium://ai</p>
          <h2 class="section-hero__title">Palladium AI</h2>
          <p class="section-hero__text">
            Ask about the site, the game list, or anything else you want to throw at it.
          </p>
        </div>
        <div class="section-hero__status" data-role="ai-status">Connecting...</div>
      </div>

      <div class="ai-layout">
        <aside class="content-card ai-prompts">
          <div class="content-card__header">
            <div>
              <p class="content-card__eyebrow">Try these</p>
              <h3 class="content-card__title">Starter prompts</h3>
            </div>
          </div>
          <div class="prompt-list">
            <button type="button" class="prompt-chip" data-prompt="What are the best games on this site?">
              Best games on the site
            </button>
            <button type="button" class="prompt-chip" data-prompt="Show me five horror games from the catalog.">
              Five horror games
            </button>
            <button type="button" class="prompt-chip" data-prompt="What can I type in the Palladium address bar?">
              Address bar help
            </button>
          </div>
        </aside>

        <section class="content-card ai-chat">
          <div class="ai-chat__messages" data-role="ai-messages" aria-live="polite"></div>
          <form class="ai-chat__form" data-role="ai-form">
            <label class="sr-only" for="ai-input">Ask Palladium AI</label>
            <textarea
              id="ai-input"
              class="ai-chat__input"
              rows="3"
              placeholder="Ask Palladium AI something..."
            ></textarea>
            <div class="ai-chat__actions">
              <button type="submit" class="toolbar-button toolbar-button--accent">Send</button>
            </div>
          </form>
        </section>
      </div>
    </section>
  </template>

  <template id="settings-pane-template">
    <section class="shell-pane shell-pane--internal shell-pane--settings">
      <div class="section-hero">
        <div>
          <p class="section-hero__eyebrow">palladium://settings</p>
          <h2 class="section-hero__title">Shell Settings</h2>
          <p class="section-hero__text">
            Pick a theme, cloak the tab, and launch Palladium inside an about:blank wrapper.
          </p>
        </div>
        <div class="section-hero__status" data-role="settings-status">Saved locally in this browser.</div>
      </div>

      <div class="settings-grid">
        <section class="content-card settings-card">
          <div class="content-card__header">
            <div>
              <p class="content-card__eyebrow">Themes</p>
              <h3 class="content-card__title">Shell palette</h3>
            </div>
          </div>
          <div class="theme-grid" data-role="theme-grid"></div>
        </section>

        <section class="content-card settings-card">
          <div class="content-card__header">
            <div>
              <p class="content-card__eyebrow">Tab cloaking</p>
              <h3 class="content-card__title">Title and favicon</h3>
            </div>
          </div>
          <form class="settings-form" data-role="cloak-form">
            <label class="settings-field">
              <span class="settings-field__label">Tab title</span>
              <input class="settings-field__input" type="text" name="cloak-title" placeholder="Google Classroom" autocomplete="off" />
            </label>
            <label class="settings-field">
              <span class="settings-field__label">Favicon URL</span>
              <input class="settings-field__input" type="url" name="cloak-favicon" placeholder="https://example.com/favicon.ico" autocomplete="off" />
            </label>
            <div class="settings-actions">
              <button type="submit" class="toolbar-button toolbar-button--accent">Apply cloak</button>
              <button type="button" class="toolbar-button" data-settings-action="reset-cloak">Reset cloak</button>
            </div>
          </form>
          <div class="preset-grid" data-role="cloak-presets"></div>
        </section>

        <section class="content-card settings-card">
          <div class="content-card__header">
            <div>
              <p class="content-card__eyebrow">Launch</p>
              <h3 class="content-card__title">About:blank tools</h3>
            </div>
          </div>
          <div class="settings-actions settings-actions--stacked">
            <button type="button" class="toolbar-button toolbar-button--accent" data-settings-action="aboutblank-shell">
              Open Palladium In About:Blank
            </button>
            <button type="button" class="toolbar-button" data-settings-action="reset-all">
              Reset Theme And Cloak
            </button>
          </div>
          <div class="settings-preview">
            <div class="settings-preview__label">Current cloak</div>
            <div class="settings-preview__value" data-role="settings-preview-title">Palladium Games</div>
            <div class="settings-preview__meta" data-role="settings-preview-favicon">images/favicon.png?v=4</div>
            <div class="settings-preview__meta" data-role="settings-preview-theme">default</div>
          </div>
        </section>
      </div>
    </section>
  </template>

  <script src="site-settings.js"></script>
  <script src="backend.js"></script>
  <script src="baremux/index.js"></script>
  <script src="scram/scramjet.all.js"></script>
  <script src="games-static.js"></script>
  <script src="shell-core.js"></script>
  <script src="shell.js"></script>
</body>
</html>
