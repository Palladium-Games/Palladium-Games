<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function(){
      try {
        var stored = sessionStorage.getItem('palladium-nav-expanded');
        document.documentElement.classList.add(stored === '1' ? 'nav-initial-expanded' : 'nav-initial-collapsed');
      } catch (e) {}
    })();
  </script>
  <title>Discord — Palladium Games</title>
  <link rel="icon" href="images/favicon.png?v=3" type="image/png" />
  <link rel="shortcut icon" href="favicon.ico?v=3" type="image/x-icon" />
  <link rel="apple-touch-icon" href="images/favicon.png?v=3" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <nav id="nav" class="nav">
      <div class="nav__toggle">
        <button type="button" id="nav-toggle" class="nav__toggle-btn" aria-label="Toggle menu">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 12h12"/><path d="M4 17h16"/></svg>
        </button>
      </div>
      <div class="nav__logo">
        <img src="images/favicon.png" alt="Palladium" class="nav__logo-icon" />
        <span class="nav__logo-text">PALLADIUM</span>
      </div>
      <div class="nav__links">
        <a href="index.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9 20v-5h6v5"/></svg>
          <span class="nav__link-text">Home</span>
        </a>
        <a href="games.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="9" rx="4.5"/><path d="M8 13h4"/><path d="M10 11v4"/><circle cx="15.5" cy="12.5" r="1"/><circle cx="18" cy="14.5" r="1"/></svg>
          <span class="nav__link-text">Games</span>
        </a>
        <a href="proxy.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M4.5 9h15"/><path d="M4.5 15h15"/><path d="M12 4a12 12 0 0 1 0 16"/><path d="M12 4a12 12 0 0 0 0 16"/></svg>
          <span class="nav__link-text">Proxy</span>
        </a>
        <a href="ai.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="7" width="16" height="11" rx="3"/><path d="M12 7V4"/><path d="M9 4h6"/><circle cx="9.5" cy="12.5" r="1"/><circle cx="14.5" cy="12.5" r="1"/><path d="M8.5 15.5h7"/></svg>
          <span class="nav__link-text">AI</span>
        </a>
        <a href="music.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17.8V6.5l10-2V16"/><circle cx="7" cy="18" r="2.4"/><circle cx="17" cy="16" r="2.4"/></svg>
          <span class="nav__link-text">Music</span>
        </a>
      </div>
    </nav>

    <main class="main">
      <div class="page page--discord">
        <section class="discord-present">
          <div class="discord-present__spotlight" aria-hidden="true"></div>
          <header class="discord-present__header">
            <span class="discord-present__eyebrow">Palladium Community Deck</span>
            <h1 id="discord-server-name" class="discord-present__title">Palladium Games</h1>
            <p id="discord-server-status" class="discord-summary__status discord-present__status">Loading widget data...</p>
          </header>

          <section class="discord-present__panel">
            <div class="discord-present__server">
              <img id="discord-server-icon" class="discord-summary__icon discord-present__icon" src="images/discord.png" alt="Discord server icon" />
              <span class="discord-present__server-label">Live Server Pulse</span>
            </div>
            <div class="discord-metrics">
              <div class="discord-metric">
                <span class="discord-metric__label">Online</span>
                <span id="discord-online-count" class="discord-metric__value">0</span>
              </div>
              <div class="discord-metric">
                <span class="discord-metric__label">Members Listed</span>
                <span id="discord-members-count" class="discord-metric__value">0</span>
              </div>
              <div class="discord-metric">
                <span class="discord-metric__label">Channels</span>
                <span id="discord-channels-count" class="discord-metric__value">0</span>
              </div>
            </div>
            <div class="discord-summary__actions discord-present__actions">
              <a id="discord-invite-link" class="player-bar__btn" href="https://discord.gg/FNACSCcE26" target="_blank" rel="noopener noreferrer">Join Server</a>
              <button id="discord-refresh-btn" class="player-bar__btn" type="button">Refresh</button>
            </div>
          </section>

          <section class="discord-card discord-card--ticker discord-present__runway">
            <h3 class="discord-card__title">Member Runway</h3>
            <div class="discord-ticker" id="discord-ticker" aria-live="polite">
              <div class="discord-ticker__track" id="discord-ticker-track">
                <div class="discord-ticker__lane">
                  <span class="discord-avatar discord-avatar--placeholder" aria-hidden="true"></span>
                  <span class="discord-avatar discord-avatar--placeholder" aria-hidden="true"></span>
                  <span class="discord-avatar discord-avatar--placeholder" aria-hidden="true"></span>
                  <span class="discord-avatar discord-avatar--placeholder" aria-hidden="true"></span>
                  <span class="discord-avatar discord-avatar--placeholder" aria-hidden="true"></span>
                </div>
              </div>
            </div>
          </section>
        </section>
      </div>
    </main>
  </div>

  <script src="site-settings.js"></script>
  <script src="backend.js"></script>
  <script src="nav.js"></script>
  <script>
    (function () {
      var WIDGET_FALLBACK_URL = 'https://discord.com/api/guilds/1479914434460913707/widget.json';
      var INVITE_FALLBACK_URL = 'https://discord.gg/FNACSCcE26';
      var WIDGET_ENDPOINT = '/api/discord/widget';

      var serverNameEl = document.getElementById('discord-server-name');
      var serverStatusEl = document.getElementById('discord-server-status');
      var serverIconEl = document.getElementById('discord-server-icon');
      var inviteLinkEl = document.getElementById('discord-invite-link');
      var onlineCountEl = document.getElementById('discord-online-count');
      var membersCountEl = document.getElementById('discord-members-count');
      var channelsCountEl = document.getElementById('discord-channels-count');
      var tickerTrackEl = document.getElementById('discord-ticker-track');
      var refreshBtn = document.getElementById('discord-refresh-btn');

      function setStatus(text, isError) {
        if (!serverStatusEl) return;
        serverStatusEl.textContent = String(text || '');
        serverStatusEl.classList.toggle('discord-summary__status--error', Boolean(isError));
      }

      function setInvite(url) {
        var href = String(url || '').trim() || INVITE_FALLBACK_URL;
        if (inviteLinkEl) inviteLinkEl.href = href;
      }

      function fillText(el, text) {
        if (!el) return;
        el.textContent = String(text == null ? '' : text);
      }

      function memberKey(member, index) {
        if (member && member.id) return String(member.id);
        if (member && member.username) return String(member.username).toLowerCase();
        return 'member-' + String(index || 0);
      }

      function normalizeMembers(members) {
        var safeMembers = Array.isArray(members) ? members : [];
        var seen = {};
        var out = [];

        for (var i = 0; i < safeMembers.length; i += 1) {
          var raw = safeMembers[i] || {};
          var key = memberKey(raw, i);
          if (seen[key]) continue;
          seen[key] = true;

          out.push({
            id: key,
            username: String(raw.username || 'Member'),
            avatar: String(raw.avatar_url || '').trim() || 'images/discord.png',
            status: String(raw.status || 'online').toLowerCase()
          });
        }

        return out;
      }

      function createAvatarNode(member) {
        var wrap = document.createElement('span');
        wrap.className = 'discord-avatar';
        wrap.title = member.username + ' • ' + member.status;

        var img = document.createElement('img');
        img.className = 'discord-avatar__img';
        img.src = member.avatar;
        img.loading = 'lazy';
        img.decoding = 'async';
        img.alt = '';
        wrap.appendChild(img);

        var dot = document.createElement('span');
        dot.className = 'discord-avatar__status discord-avatar__status--' + (member.status || 'online');
        dot.setAttribute('aria-hidden', 'true');
        wrap.appendChild(dot);

        return wrap;
      }

      function renderTickerMembers(members) {
        if (!tickerTrackEl) return;

        var safeMembers = normalizeMembers(members);
        if (!safeMembers.length) {
          tickerTrackEl.innerHTML = '<div class="discord-ticker__lane"><span class="discord-tag discord-tag--muted">No member avatars available.</span></div>';
          tickerTrackEl.style.setProperty('--ticker-duration', '24s');
          return;
        }

        var laneA = document.createElement('div');
        laneA.className = 'discord-ticker__lane';
        var laneB = document.createElement('div');
        laneB.className = 'discord-ticker__lane';
        laneB.setAttribute('aria-hidden', 'true');

        for (var i = 0; i < safeMembers.length; i += 1) {
          laneA.appendChild(createAvatarNode(safeMembers[i]));
          laneB.appendChild(createAvatarNode(safeMembers[i]));
        }

        tickerTrackEl.innerHTML = '';
        tickerTrackEl.appendChild(laneA);
        tickerTrackEl.appendChild(laneB);
        tickerTrackEl.style.setProperty('--ticker-duration', String(Math.max(18, safeMembers.length * 1.5)) + 's');
      }

      function renderWidget(widget, inviteUrl) {
        var safeWidget = widget && typeof widget === 'object' ? widget : {};
        var members = Array.isArray(safeWidget.members) ? safeWidget.members : [];
        var channels = Array.isArray(safeWidget.channels) ? safeWidget.channels : [];
        var onlineCount = Number(safeWidget.presence_count || members.length || 0);

        fillText(serverNameEl, safeWidget.name || 'Palladium Games');
        fillText(onlineCountEl, onlineCount);
        fillText(membersCountEl, members.length);
        fillText(channelsCountEl, channels.length);
        setInvite(inviteUrl || safeWidget.instant_invite || INVITE_FALLBACK_URL);
        renderTickerMembers(members);

        if (serverIconEl && safeWidget.icon_url) {
          serverIconEl.src = safeWidget.icon_url;
        }

        setStatus('Live data updated.', false);
      }

      async function loadFromBackend() {
        var response = await fetch(WIDGET_ENDPOINT, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('Backend widget endpoint returned ' + response.status + '.');
        }
        var payload = await response.json();
        if (!payload || !payload.ok || !payload.widget) {
          throw new Error('Backend widget payload was invalid.');
        }
        return payload;
      }

      async function loadDirectWidget() {
        var response = await fetch(WIDGET_FALLBACK_URL, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error('Widget URL returned ' + response.status + '.');
        }
        var widget = await response.json();
        if (!widget || typeof widget !== 'object') {
          throw new Error('Widget response was invalid.');
        }
        return {
          ok: true,
          inviteUrl: widget.instant_invite || INVITE_FALLBACK_URL,
          widget: widget
        };
      }

      async function refreshWidget() {
        setStatus('Refreshing widget...', false);
        try {
          var payload = await loadFromBackend();
          renderWidget(payload.widget, payload.inviteUrl);
          return;
        } catch (backendError) {
          try {
            var fallbackPayload = await loadDirectWidget();
            renderWidget(fallbackPayload.widget, fallbackPayload.inviteUrl);
            setStatus('Loaded direct widget fallback.', false);
            return;
          } catch (directError) {
            console.warn('Discord widget load failed:', backendError, directError);
          }
        }

        setStatus('Could not load Discord widget right now.', true);
      }

      if (refreshBtn) {
        refreshBtn.addEventListener('click', function () {
          refreshWidget();
        });
      }

      refreshWidget();
    })();
  </script>
</body>
</html>
