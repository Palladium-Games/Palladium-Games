    <div class="game-page-container">
        <div class="game-content-area" id="gameContentArea">
            <div class="game-wrapper game-player-wrapper">
                <div class="game-player-frame-wrap">
                    <iframe id="gameFrame" class="game-player-iframe" src="about:blank" title="Game" allowfullscreen></iframe>
                </div>
                <div class="game-footer">
                    <div class="game-title-section">
                        <h1 class="game-title" id="gameTitle">Five Nights at Freddy's</h1>
                        <p class="game-author" id="gameAuthor">Author: Scott Cawthon</p>
                    </div>
                    <div class="game-controls">
                        <button class="game-control-btn" id="fullscreenBtn" title="Fullscreen">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                            </svg>
                        </button>
                        <button class="game-control-btn" id="newTabBtn" title="Open in New Tab">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>

                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="nav-strip.js"></script>
    <script>
        (function() {
            var DEFAULT_GAME = 'games/fnaf-1.html';
            var DEFAULT_TITLE = 'Five Nights at Freddy\'s';
            var DEFAULT_AUTHOR = 'Author: Scott Cawthon';

            var params = new URLSearchParams(window.location.search);
            var rawGameSrc = params.get('game') || DEFAULT_GAME;
            var gameTitle = params.get('title') || DEFAULT_TITLE;
            var gameAuthor = params.get('author') || DEFAULT_AUTHOR;

            var frame = document.getElementById('gameFrame');
            var titleEl = document.getElementById('gameTitle');
            var authorEl = document.getElementById('gameAuthor');

            var directGameUrl = resolveGameUrl(rawGameSrc);
            var currentLaunchUrl = directGameUrl;

            if (titleEl) titleEl.textContent = gameTitle;
            if (authorEl) authorEl.textContent = gameAuthor;
            if (frame) frame.src = directGameUrl;

            function resolveGameUrl(value) {
                var raw = (value || '').trim();
                if (!raw) {
                    raw = DEFAULT_GAME;
                }

                try {
                    var resolved = new URL(raw, window.location.href);
                    if (resolved.protocol !== 'http:' && resolved.protocol !== 'https:') {
                        throw new Error('Unsupported protocol');
                    }
                    return resolved.href;
                } catch (_error) {
                    return new URL(DEFAULT_GAME, window.location.href).href;
                }
            }

            var fullscreenBtn = document.getElementById('fullscreenBtn');
            var gameContentArea = document.getElementById('gameContentArea');
            var newTabBtn = document.getElementById('newTabBtn');
            var isFullscreen = false;

            function toggleFullscreen() {
                if (!isFullscreen) {
                    if (gameContentArea.requestFullscreen) {
                        gameContentArea.requestFullscreen();
                    } else if (gameContentArea.webkitRequestFullscreen) {
                        gameContentArea.webkitRequestFullscreen();
                    } else if (gameContentArea.msRequestFullscreen) {
                        gameContentArea.msRequestFullscreen();
                    }
                    gameContentArea.classList.add('fullscreen');
                    isFullscreen = true;
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                    gameContentArea.classList.remove('fullscreen');
                    isFullscreen = false;
                }
            }

            if (fullscreenBtn) fullscreenBtn.addEventListener('click', toggleFullscreen);

            document.addEventListener('fullscreenchange', function() {
                isFullscreen = !!document.fullscreenElement;
                gameContentArea.classList.toggle('fullscreen', isFullscreen);
            });
            document.addEventListener('webkitfullscreenchange', function() {
                isFullscreen = !!document.webkitFullscreenElement;
                gameContentArea.classList.toggle('fullscreen', isFullscreen);
            });
            document.addEventListener('msfullscreenchange', function() {
                isFullscreen = !!document.msFullscreenElement;
                gameContentArea.classList.toggle('fullscreen', isFullscreen);
            });

            if (newTabBtn) {
                newTabBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.open(currentLaunchUrl, '_blank');
                });
            }
        })();
    </script>
