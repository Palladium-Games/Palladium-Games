<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Player - Platinum Games</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .game-player-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
            width: 100% !important;
            max-width: 100% !important;
        }
        .game-player-frame-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
            background: #000;
            width: 100% !important;
            min-width: 0;
        }
        .game-player-iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            display: block;
            background: #000;
        }
        .game-content-area .game-player-wrapper {
            align-self: stretch;
            flex: 1;
            min-width: 0;
        }
    </style>
</head>
<body class="game-page">
    <div class="sidebar-menu">
        <div class="sidebar-logo">P</div>
        <div class="sidebar-separator"></div>
        <div class="sidebar-content" id="sidebarContent">
            <a href="index.html" class="sidebar-link" title="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            </a>
            <a href="games.html" class="sidebar-link active" title="Games">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="6" y="2" width="12" height="20" rx="2"/>
                    <path d="M12 18h.01"/>
                </svg>
            </a>
            <a href="proxy.html" class="sidebar-link" title="Proxy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </a>
        </div>
    </div>

    <div class="game-page-container">
        <div class="game-content-area" id="gameContentArea">
            <div class="game-wrapper game-player-wrapper">
                <div class="game-player-frame-wrap">
                    <iframe id="gameFrame" class="game-player-iframe" src="games/fnaf-1.html" title="Game"></iframe>
                </div>
                <div class="game-footer">
                    <div class="game-title-section">
                        <h1 class="game-title" id="gameTitle">Five Nights at Freddy's</h1>
                        <p class="game-author" id="gameAuthor">Author: Scott Cawthon</p>
                    </div>
                    <div class="game-controls">
                        <button class="game-control-btn" id="fullscreenBtn" title="Fullscreen">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                            </svg>
                        </button>
                        <button class="game-control-btn" id="newTabBtn" title="Open in New Tab">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var gameSrc = params.get('game') || 'games/fnaf-1.html';
            var gameTitle = params.get('title') || 'Five Nights at Freddy\'s';
            var gameAuthor = params.get('author') || 'Author: Scott Cawthon';

            var frame = document.getElementById('gameFrame');
            var titleEl = document.getElementById('gameTitle');
            var authorEl = document.getElementById('gameAuthor');

            if (frame) frame.src = gameSrc;
            if (titleEl) titleEl.textContent = gameTitle;
            if (authorEl) authorEl.textContent = gameAuthor;

            var fullscreenBtn = document.getElementById('fullscreenBtn');
            var gameContentArea = document.getElementById('gameContentArea');
            var newTabBtn = document.getElementById('newTabBtn');
            var isFullscreen = false;

            function toggleFullscreen() {
                if (!isFullscreen) {
                    if (gameContentArea.requestFullscreen) {
                        gameContentArea.requestFullscreen();
                    } else if (gameContentArea.webkitRequestFullscreen) {
                        gameContentArea.webkitRequestFullscreen();
                    } else if (gameContentArea.msRequestFullscreen) {
                        gameContentArea.msRequestFullscreen();
                    }
                    gameContentArea.classList.add('fullscreen');
                    isFullscreen = true;
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                    gameContentArea.classList.remove('fullscreen');
                    isFullscreen = false;
                }
            }

            if (fullscreenBtn) fullscreenBtn.addEventListener('click', toggleFullscreen);

            document.addEventListener('fullscreenchange', function() {
                isFullscreen = !!document.fullscreenElement;
                gameContentArea.classList.toggle('fullscreen', isFullscreen);
            });
            document.addEventListener('webkitfullscreenchange', function() {
                isFullscreen = !!document.webkitFullscreenElement;
                gameContentArea.classList.toggle('fullscreen', isFullscreen);
            });
            document.addEventListener('msfullscreenchange', function() {
                isFullscreen = !!document.msFullscreenElement;
                gameContentArea.classList.toggle('fullscreen', isFullscreen);
            });

            if (newTabBtn) {
                newTabBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.open(frame ? frame.src : gameSrc, '_blank');
                });
            }
        })();
    </script>
</body>
</html>
