<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
		<title>Palladium</title>
		<link rel="shortcut icon" href="favicon.ico" />
		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>
		<link rel="stylesheet" href="index.css" />
		<script src="register-sw.js" defer></script>
		<script src="search.js" defer></script>
		<script src="index.js" defer></script>
	</head>
	<body>
		<div title="Logo" class="flex-center logo-wrapper header-center">
			<h1>Browse</h1>
		</div>
		<div class="flex-center desc left-margin">
			<p>
				Search or enter an address.
			</p>
		</div>
		<form id="sj-form" class="flex-center">
			<input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
			<input id="sj-address" type="text" placeholder="Search or enter address" />
		</form>
		<div class="desc left-margin">
			<p id="sj-error"></p>
			<pre id="sj-error-code"></pre>
		</div>
		<div id="sj-loading" class="auto-navigate-loading" aria-live="polite">Loading…</div>
		<footer>
			<div>
				<a title="GitHub" href="https://github.com/MercuryWorkshop/Scramjet-App">GitHub</a>
				<a title="Credits" href="credits.html">Credits</a>
			</div>
			<div>
			</div>
		</footer>
	</body>
</html>
