<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function(){
      try {
        var stored = sessionStorage.getItem('palladium-nav-expanded');
        document.documentElement.classList.add(stored === '1' ? 'nav-initial-expanded' : 'nav-initial-collapsed');
      } catch (e) {}
    })();
  </script>
  <title>Palladium Games</title>
  <link rel="icon" href="images/favicon.png?v=3" type="image/png" />
  <link rel="shortcut icon" href="favicon.ico?v=3" type="image/x-icon" />
  <link rel="apple-touch-icon" href="images/favicon.png?v=3" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <nav id="nav" class="nav">
      <div class="nav__toggle">
        <button type="button" id="nav-toggle" class="nav__toggle-btn" aria-label="Toggle menu">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M4 12h12"/><path d="M4 17h16"/></svg>
        </button>
      </div>
      <div class="nav__logo">
        <img src="images/favicon.png" alt="Palladium" class="nav__logo-icon" />
        <span class="nav__logo-text">PALLADIUM</span>
      </div>
      <div class="nav__links">
        <a href="index.html" class="nav__link nav__link--active">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9 20v-5h6v5"/></svg>
          <span class="nav__link-text">Home</span>
        </a>
        <a href="games.html" class="nav__link">
          <svg class="nav__link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="18" height="9" rx="4.5"/><path d="M8 13h4"/><path d="M10 11v4"/><circle cx="15.5" cy="12.5" r="1"/><circle cx="18" cy="14.5" r="1"/></svg>
          <span class="nav__link-text">Games</span>
        </a>
      </div>
    </nav>
    <main class="main">
      <section class="page-hero">
        <div class="hero-title-wrap">
          <h1 class="hero-title">
            <span class="hero-title__word" aria-hidden="true">PALLADIUM</span>
            <span class="hero-title__word" aria-hidden="true">GAMES</span>
          </h1>
          <p class="hero-subtitle">Your daily dose of games.</p>
        </div>
        <div class="hero-glow hero-glow--1" aria-hidden="true"></div>
        <div class="hero-glow hero-glow--2" aria-hidden="true"></div>
        <div class="hero-line hero-line--t" aria-hidden="true"></div>
        <div class="hero-line hero-line--b" aria-hidden="true"></div>
      </section>
    </main>
  </div>
  <div id="discord-notification" class="discord-notification" role="dialog" aria-label="Join Discord" aria-modal="true" hidden>
    <div class="discord-notification__card">
      <button type="button" class="discord-notification__close" aria-label="Dismiss">×</button>
      <img src="images/discord.png" alt="" class="discord-notification__img" />
      <div class="discord-notification__body">
        <span class="discord-notification__title">Join The Discord!</span>
        <span class="discord-notification__desc">Updates, community & more.</span>
        <a href="https://discord.gg/FNACSCcE26" target="_blank" rel="noopener noreferrer" class="discord-notification__btn">JOIN</a>
      </div>
    </div>
  </div>
  <time id="footer-time" class="footer-time" aria-live="polite"></time>
  <a href="https://github.com/Palladium-Games" target="_blank" rel="noopener noreferrer" class="footer-github" aria-label="Palladium Games on GitHub">GitHub</a>
  <script>
    (function() {
      function pad(n) { return (n < 10 ? '0' : '') + n; }
      function updateTime() {
        var el = document.getElementById('footer-time');
        if (!el) return;
        var d = new Date();
        var h = d.getHours();
        var m = d.getMinutes();
        var s = d.getSeconds();
        var am = h < 12;
        var h12 = h % 12 || 12;
        el.textContent = pad(h12) + ':' + pad(m) + ':' + pad(s) + ' ' + (am ? 'AM' : 'PM');
        el.setAttribute('datetime', d.toISOString());
      }
      updateTime();
      setInterval(updateTime, 1000);
    })();
  </script>
  <script src="site-settings.js"></script>
  <script src="backend.js"></script>
  <script src="nav.js"></script>
  <script>
    (function() {
      try {
        if (sessionStorage.getItem('palladium-discord-dismissed')) return;
        var el = document.getElementById('discord-notification');
        if (!el) return;
        var close = el.querySelector('.discord-notification__close');
        var joinBtn = el.querySelector('.discord-notification__btn');
        var discordUrl = 'https://discord.gg/FNACSCcE26';
        var duration = 350;

        function finishHide() {
          el.setAttribute('hidden', '');
          el.classList.remove('discord-notification--visible', 'discord-notification--hiding');
          try { sessionStorage.setItem('palladium-discord-dismissed', '1'); } catch (e) {}
        }

        function hide(openLink) {
          if (el.classList.contains('discord-notification--hiding')) return;
          el.classList.remove('discord-notification--visible');
          el.classList.add('discord-notification--hiding');
          setTimeout(function() {
            finishHide();
            if (openLink) window.open(discordUrl, '_blank', 'noopener,noreferrer');
          }, duration);
        }

        if (close) close.addEventListener('click', function() { hide(false); });
        if (joinBtn) {
          joinBtn.addEventListener('click', function(e) {
            e.preventDefault();
            hide(true);
          });
        }

        setTimeout(function() {
          el.removeAttribute('hidden');
          requestAnimationFrame(function() {
            requestAnimationFrame(function() {
              el.classList.add('discord-notification--visible');
            });
          });
        }, 1000);
      } catch (e) {}
    })();
  </script>
</body>
</html>
