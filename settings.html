    })();

<body>

    <main class="main">
      <div class="page page--settings">
        <section class="settings-shell">
          <header class="settings-shell__header">
            <h1 class="settings-shell__title">Website Settings</h1>
            <p class="settings-shell__subtitle">Customize tab title, favicon, and launch in about:blank.</p>
          </header>

          <div class="settings-grid">
            <form id="settings-form" class="settings-card settings-form">
              <label class="settings-field">
                <span class="settings-field__label">Website title</span>
                <input id="settings-title" class="settings-input" type="text" placeholder="Palladium Games" autocomplete="off" />
              </label>
              <div class="settings-divider" aria-hidden="true"></div>

              <label class="settings-field">
                <span class="settings-field__label">Favicon URL/path or website URL</span>
                <div class="settings-fetch__row">
                  <input id="settings-favicon-source" class="settings-input" type="text" placeholder="images/favicon.png or https://schoology.com" autocomplete="off" />
                  <button type="button" id="settings-detect-btn" class="settings-btn">Detect</button>
                </div>
              </label>
              <div class="settings-divider" aria-hidden="true"></div>

              <div class="settings-field settings-upload">
                <span class="settings-field__label">Upload favicon image</span>
                <input id="settings-favicon-file" class="settings-file-input" type="file" accept="image/*" />
                <div class="settings-upload__row">
                  <label for="settings-favicon-file" class="settings-btn settings-btn--file">Choose image</label>
                  <span id="settings-file-name" class="settings-upload__name">No file selected</span>
                </div>
              </div>
              <div class="settings-divider" aria-hidden="true"></div>

              <div class="settings-actions">
                <button type="submit" class="settings-btn settings-btn--primary">Save</button>
                <button type="button" id="settings-reset" class="settings-btn">Reset</button>
                <button type="button" id="settings-aboutblank" class="settings-btn">Open in about:blank</button>
              </div>

              <p id="settings-status" class="settings-status" aria-live="polite"></p>
            </form>

            <aside class="settings-card settings-preview">
              <h2 class="settings-preview__title">Preview</h2>
              <img id="settings-preview-icon" class="settings-preview__icon" src="images/favicon.png" alt="Favicon preview" />
              <div id="settings-preview-title" class="settings-preview__text">Palladium Games</div>
              <p class="settings-preview__hint">Changes are stored in your browser for this site.</p>
            </aside>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="site-settings.js"></script>
  <script src="backend.js"></script>
  <script src="nav.js"></script>
  <script>
    (function () {
      var api = window.PalladiumSiteSettings;
      var form = document.getElementById('settings-form');
      var titleInput = document.getElementById('settings-title');
      var sourceInput = document.getElementById('settings-favicon-source');
      var detectBtn = document.getElementById('settings-detect-btn');
      var fileInput = document.getElementById('settings-favicon-file');
      var fileNameEl = document.getElementById('settings-file-name');
      var resetBtn = document.getElementById('settings-reset');
      var aboutBlankBtn = document.getElementById('settings-aboutblank');
      var previewIcon = document.getElementById('settings-preview-icon');
      var previewTitle = document.getElementById('settings-preview-title');
      var statusEl = document.getElementById('settings-status');

      if (!api) return;

      function setStatus(text, isError) {
        if (!statusEl) return;
        statusEl.textContent = String(text || '');
        statusEl.classList.toggle('settings-status--error', Boolean(isError));
      }

      function currentSourceValue() {
        var raw = sourceInput ? sourceInput.value : '';
        return String(raw || '').trim();
      }

      function currentTitleValue() {
        var raw = titleInput ? titleInput.value : '';
        return String(raw || '').trim();
      }

      function normalizeUrl(value) {
        var raw = String(value || '').trim();
        if (!raw) return '';
        if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
        try {
          return new URL(raw).toString();
        } catch (error) {
          return '';
        }
      }

      function isDomainLike(value) {
        return /^[a-z0-9.-]+\.[a-z]{2,}(\/.*)?$/i.test(String(value || '').trim());
      }

      function hasImageExtension(value) {
        return /\.(ico|png|svg|jpg|jpeg|gif|webp)([?#].*)?$/i.test(String(value || '').trim());
      }

      function isDirectFaviconValue(value) {
        var raw = String(value || '').trim();
        if (!raw) return false;
        if (/^data:image\//i.test(raw)) return true;
        if (/^(\/|\.{1,2}\/)/.test(raw)) return true;
        if (!/^https?:\/\//i.test(raw) && !isDomainLike(raw)) return true;
        if (hasImageExtension(raw)) return true;
        return false;
      }

      function resolveAbsoluteUrl(raw, base) {
        var value = String(raw || '').trim();
        if (!value) return '';
        try {
          return new URL(value, base).toString();
        } catch (error) {
          return '';
        }
      }

      function extractFavicon(doc, baseUrl) {
        var links = doc.querySelectorAll('link[rel][href]');
        var picks = [];

        for (var i = 0; i < links.length; i += 1) {
          var rel = String(links[i].getAttribute('rel') || '').toLowerCase();
          if (rel.indexOf('icon') === -1) continue;

          var href = resolveAbsoluteUrl(links[i].getAttribute('href') || '', baseUrl);
          if (!href) continue;

          var score = 0;
          if (rel.indexOf('shortcut') !== -1) score += 1;
          if (rel.indexOf('apple-touch-icon') !== -1) score += 1;
          if (rel === 'icon') score += 2;
          if (rel.indexOf('mask-icon') !== -1) score -= 1;
          if ((links[i].getAttribute('sizes') || '').toLowerCase().indexOf('any') !== -1) score += 1;

          picks.push({ href: href, score: score });
        }

        if (picks.length) {
          picks.sort(function (a, b) { return b.score - a.score; });
          return picks[0].href;
        }

        var ogImage = doc.querySelector('meta[property="og:image"]');
        if (ogImage) {
          var ogImageUrl = resolveAbsoluteUrl(ogImage.getAttribute('content') || '', baseUrl);
          if (ogImageUrl) return ogImageUrl;
        }

        try {
          var parsed = new URL(baseUrl);
          return parsed.origin + '/favicon.ico';
        } catch (error) {
          return '';
        }
      }

      async function fetchSiteFavicon(sourceUrl) {
        var target = normalizeUrl(sourceUrl);
        if (!target) {
          throw new Error('Enter a valid URL.');
        }

        var endpoint = '/api/proxy/fetch?url=' + encodeURIComponent(target);
        var requestUrl = window.PalladiumBackend && typeof window.PalladiumBackend.apiUrl === 'function'
          ? window.PalladiumBackend.apiUrl(endpoint)
          : endpoint;

        var response = await fetch(requestUrl, { method: 'GET' });
        if (!response.ok) {
          throw new Error('Could not fetch that URL (status ' + response.status + ').');
        }

        var html = await response.text();
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');

        return extractFavicon(doc, target);
      }

      async function resolveFaviconSource(sourceValue) {
        var raw = String(sourceValue || '').trim();
        if (!raw) return '';

        if (isDirectFaviconValue(raw)) {
          if (isDomainLike(raw) && hasImageExtension(raw) && !/^https?:\/\//i.test(raw)) {
            return 'https://' + raw;
          }
          return raw;
        }

        var normalized = normalizeUrl(raw);
        if (!normalized) {
          throw new Error('Enter a valid favicon URL/path or website URL.');
        }

        var detected = await fetchSiteFavicon(normalized);
        if (!detected) {
          throw new Error('Could not detect a favicon from that website.');
        }
        return detected;
      }

      function renderPreview() {
        if (previewTitle) {
          previewTitle.textContent = currentTitleValue() || api.defaultTitle;
        }
        if (previewIcon) {
          var icon = currentSourceValue() || api.getSettings().favicon || api.defaultFavicon;
          previewIcon.src = icon;
        }
      }

      function loadIntoForm() {
        var settings = api.getSettings();
        if (titleInput) titleInput.value = settings.title || '';
        if (sourceInput) sourceInput.value = settings.favicon || '';
        if (fileInput) fileInput.value = '';
        if (fileNameEl) fileNameEl.textContent = 'No file selected';
        renderPreview();
      }

      if (form) {
        form.addEventListener('submit', async function (event) {
          event.preventDefault();

          try {
            var resolved = await resolveFaviconSource(currentSourceValue());
            api.setTitle(currentTitleValue());
            api.setFavicon(resolved);
            if (sourceInput) sourceInput.value = resolved;
            renderPreview();
            setStatus('Title and favicon applied.', false);
          } catch (error) {
            setStatus(String((error && error.message) || error || 'Failed to apply settings.'), true);
          }
        });
      }

      if (resetBtn) {
        resetBtn.addEventListener('click', function () {
          api.reset();
          loadIntoForm();
          setStatus('Reset to default title and favicon.', false);
        });
      }

      if (aboutBlankBtn) {
        aboutBlankBtn.addEventListener('click', function () {
          var target = new URL('index.html', window.location.href).toString();
          var result = api.openInAboutBlank(target);
          if (result.ok) {
            setStatus('Opened site in an about:blank tab.', false);
          } else {
            setStatus(result.error || 'Could not open about:blank tab.', true);
          }
        });
      }

      if (sourceInput) {
        sourceInput.addEventListener('input', renderPreview);
        sourceInput.addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            if (detectBtn) detectBtn.click();
          }
        });
      }

      if (titleInput) {
        titleInput.addEventListener('input', renderPreview);
      }

      if (detectBtn) {
        detectBtn.addEventListener('click', async function () {
          setStatus('Detecting favicon...', false);

          try {
            var resolved = await resolveFaviconSource(currentSourceValue());
            if (sourceInput) sourceInput.value = resolved;
            renderPreview();
            setStatus('Favicon detected. Click Apply Favicon to save.', false);
          } catch (error) {
            setStatus(String((error && error.message) || error || 'Failed to detect favicon.'), true);
          }
        });
      }

      if (fileInput) {
        fileInput.addEventListener('change', function () {
          var file = fileInput.files && fileInput.files[0];
          if (!file) return;
          if (fileNameEl) fileNameEl.textContent = file.name;

          var reader = new FileReader();
          reader.onload = function () {
            if (typeof reader.result === 'string' && sourceInput) {
              sourceInput.value = reader.result;
              renderPreview();
              setStatus('Image loaded. Click Apply Favicon to save.', false);
            }
          };
          reader.onerror = function () {
            setStatus('Failed to read the selected file.', true);
          };
          reader.readAsDataURL(file);
        });
      }

      loadIntoForm();
      setStatus('Ready.', false);
    })();
  </script>
</body>
</html>
